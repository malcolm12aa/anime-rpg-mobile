// Show target-selection menu; if only 1 living enemy, fires callback immediately
function selectTarget(onSelect) {
    const living = B.enemies.reduce((a, _, i) => { if (B.enemy_hps[i] > 0) a.push(i); return a; }, []);
    if (living.length <= 1) { onSelect(living[0] ?? 0); return; }
    $ch.innerHTML = '';
    const lbl = document.createElement('p');
    lbl.className = 'b-system'; lbl.textContent = '— Choose Target —';
    $ch.appendChild(lbl);
    living.forEach(i => {
        const en = B.enemies[i];
        const b = document.createElement('button');
        b.textContent = en.emoji + '  ' + en.name + '  (' + B.enemy_hps[i] + ' / ' + en.hp + ' HP)';
        b.onclick = () => onSelect(i);
        $ch.appendChild(b);
    });
    const back = document.createElement('button');
    back.textContent = '← Back';
    back.onclick = showBattleMenu;
    $ch.appendChild(back);
}

function startBattle(enemyOrArr) {
    const arr = Array.isArray(enemyOrArr) ? enemyOrArr : [enemyOrArr];
    const enemies  = arr.map(e => ({ ...e }));
    const hps      = enemies.map(e => e.hp);
    const fxs      = enemies.map(() => ({}));
    const recruitState = buildRecruitBattleState();
    B = {
        enemies,
        enemy_hps: hps,
        e_fxs:     fxs,
        enemy_idx: 0,
        p_fx: {},
        recruit_used: {},
        recruit_hps: recruitState.hps,
        recruit_max_hps: recruitState.max,
        get enemy()    { return this.enemies[this.enemy_idx]; },
        get enemy_hp() { return this.enemy_hps[this.enemy_idx]; },
        set enemy_hp(v){ this.enemy_hps[this.enemy_idx] = v; },
        get e_fx()     { return this.e_fxs[this.enemy_idx]; },
    };
    showBattlePanel(true);
    clearOutput();
    if (enemies.length === 1) {
        print('— ENCOUNTER —', 'b-system');
        print(enemies[0].emoji + '  ' + enemies[0].name + ' appeared!', 'danger');
        print(enemies[0].lore, 'narrator');
    } else {
        print('— GROUP ENCOUNTER  (' + enemies.length + ' enemies!) —', 'b-system');
        enemies.forEach(e => print(e.emoji + '  ' + e.name, 'danger'));
        print(enemies[0].lore, 'narrator');
    }
    print('');
    updateBattlePanel();
    showBattleMenu();
}

// ── Player actions ────────────────────────────────────────────
function doAttack() {
    selectTarget(idx => {
        B.enemy_idx = idx;
        disableAll();
        const base    = G.atk + (G.weapon ? G.weapon.atk : 0);
        const isCrit  = Math.random() < G.agi * 0.004;
        const dmg     = Math.floor(base * (0.85 + Math.random() * 0.3) * atkMult('p') * vulnMult('e') * (isCrit ? 1.5 : 1));
        B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
        wakeOnHit('e');
        const targetTag = B.enemies.length > 1 ? ' [vs ' + B.enemy.name + ']' : '';
        const atkLabel = (G.weapon ? ' with ' + G.weapon.name : '') + targetTag + (isCrit ? ' — ★ CRITICAL HIT!' : '');
        print(G.name + ' attacks' + atkLabel + '  [' + dmg + ' damage]', isCrit ? 'highlight' : 'b-player');
        updateBattlePanel();
        if (G.weapon && G.weapon.statusId && Math.random() < (G.weapon.statusChance || 0.25))
            applyFx('e', G.weapon.statusId);
        if (checkWin()) return;
        enemyTurn();
    });
}

function doSkillMenu() {
    $ch.innerHTML = '';
    const activeSkills = G.learned_skills.filter(s => s.type === 'a');
    if (G.spells.length === 0 && activeSkills.length === 0) {
        print('No skills or spells. Buy skills at the Skill Library, or level up for class skills.', 'danger');
        setTimeout(showBattleMenu, 800);
        return;
    }
    if (activeSkills.length > 0) {
        const lbl = document.createElement('p');
        lbl.className = 'b-system'; lbl.textContent = '— Class Skills —';
        $ch.appendChild(lbl);
        activeSkills.forEach(sk => {
            const b = document.createElement('button');
            const tags = (sk.aoe ? '  ★ ALL ENEMIES' : '') +
                         (sk.st ? ' → ' + STATUS[sk.st].icon + STATUS[sk.st].label : '') +
                         (sk.buf ? '  self: ' + STATUS[sk.buf].icon + STATUS[sk.buf].label : '') +
                         (sk.hits > 1 ? '  x' + sk.hits : '') +
                         (sk.drain ? '  DRAIN' : '') +
                         (sk.cleanse ? '  CLEANSE' : '') +
                         (sk.mpRestore || sk.mpRestorePct ? '  MP RESTORE' : '') +
                         (sk.hpCostPct ? '  BLOOD PRICE' : '') +
                         (sk.execute ? '  EXECUTE' : '');
            b.textContent = sk.name + '  ' + (sk.mp || 0) + ' MP' + tags;
            b.disabled = G.mp < (sk.mp || 0);
            b.onclick = () => resolveSkill(sk);
            $ch.appendChild(b);
        });
    }
    if (G.spells.length > 0) {
        const lbl = document.createElement('p');
        lbl.className = 'b-system'; lbl.textContent = '— Purchased Spells —';
        $ch.appendChild(lbl);
        G.spells.forEach(sid => {
            const sp = SPELLS.find(s => s.id === sid);
            const tags = [sp.aoe && '★ ALL ENEMIES',
                          sp.status && ('→ ' + STATUS[sp.status].icon + STATUS[sp.status].label),
                          sp.selfBuff && ('self: ' + STATUS[sp.selfBuff].icon + STATUS[sp.selfBuff].label)]
                         .filter(Boolean).join('  ');
            const b = document.createElement('button');
            b.textContent = sp.name + ' [' + sp.anime + ']  ' + sp.mp + ' MP' + (tags ? '  ' + tags : '');
            b.disabled = G.mp < sp.mp;
            b.onclick = () => castSpell(sp);
            $ch.appendChild(b);
        });
    }
    const back = document.createElement('button');
    back.textContent = '← Back';
    back.onclick = showBattleMenu;
    $ch.appendChild(back);
}

function castSpell(sp) {
    const execute = () => {
        disableAll();
        G.mp = Math.max(0, G.mp - sp.mp);
        if (sp.aoe) {
            print(G.name + ' casts ' + sp.name + '! (' + sp.anime + ') — ★ ALL ENEMIES', 'b-player');
            B.enemies.forEach((en, i) => {
                if (B.enemy_hps[i] <= 0) return;
                B.enemy_idx = i;
                const dmg = Math.floor((sp.power + G.mag_atk * 0.7 + Math.random() * 12) * vulnMult('e') * (1 + getPassiveScalar('spellBoost')));
                B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
                wakeOnHit('e');
                print('  ' + en.name + ':  ' + dmg + ' dmg!' + (sp.status ? '  ' + STATUS[sp.status].icon : ''), 'b-player');
                if (sp.status) applyFx('e', sp.status);
            });
            const fl = B.enemy_hps.findIndex(hp => hp > 0);
            B.enemy_idx = fl >= 0 ? fl : 0;
        } else {
            const dmg = Math.floor((sp.power + G.mag_atk * 0.7 + Math.random() * 12) * vulnMult('e') * (1 + getPassiveScalar('spellBoost')));
            B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
            wakeOnHit('e');
            print(G.name + ' casts ' + sp.name + '! (' + sp.anime + ')', 'b-player');
            print('Deals ' + dmg + ' damage!', 'b-player');
            if (sp.status) applyFx('e', sp.status);
        }
        if (sp.selfBuff) applyBuff('p', sp.selfBuff);
        updateStats();
        updateBattlePanel();
        if (checkWin()) return;
        enemyTurn();
    };
    if (sp.aoe) execute();
    else selectTarget(idx => { B.enemy_idx = idx; execute(); });
}


function doRecruitAssistMenu() {
    const active = getActiveRecruits();
    if (!active.length) {
        print('No active recruits. Hire allies at the Recruitment Hall in town.', 'danger');
        setTimeout(showBattleMenu, 800);
        return;
    }
    $ch.innerHTML = '';
    const lbl = document.createElement('p');
    lbl.className = 'b-system';
    lbl.textContent = '— Recruit Assists  (once per battle each) —';
    $ch.appendChild(lbl);
    active.forEach(r => {
        const used = B.recruit_used && B.recruit_used[r.id];
        const ko = B && B.recruit_hps && (B.recruit_hps[r.id] ?? recruitMaxHp(r)) <= 0;
        const a = r.assist || {};
        const tags = [
            a.kind ? a.kind.toUpperCase() : 'ASSIST',
            a.status && ('→ ' + STATUS[a.status].icon + STATUS[a.status].label),
            a.buff && ('self: ' + STATUS[a.buff].icon + STATUS[a.buff].label),
            a.cleanse && 'CLEANSE',
            (a.healPct || a.mpRestorePct) && 'RESTORE'
        ].filter(Boolean).join('  ');
        const b = document.createElement('button');
        b.textContent = (ko ? '[KO] ' : used ? '[used] ' : '') + r.emoji + '  ' + r.name + ' — ' + a.name + '  ' + tags + '\n' + r.desc;
        b.disabled = used || ko;
        b.onclick = () => useRecruitAssist(r);
        $ch.appendChild(b);
    });
    const back = document.createElement('button');
    back.textContent = '← Back';
    back.onclick = showBattleMenu;
    $ch.appendChild(back);
}

function useRecruitAssist(r) {
    if (B && B.recruit_hps && (B.recruit_hps[r.id] ?? recruitMaxHp(r)) <= 0) {
        print(r.name + ' is knocked out and cannot assist this battle.', 'danger');
        setTimeout(showBattleMenu, 800);
        return;
    }
    const a = r.assist || {};
    const finish = () => {
        B.recruit_used[r.id] = true;
        applyStats(); updateStats(); updateBattlePanel();
        if (checkWin()) return;
        enemyTurn();
    };

    const doDamageToCurrent = (pow) => {
        const dmg = Math.floor((pow + G.total_lv * 2 + G.special * 0.8) * (1 + getPassiveScalar('summonBoost')) * (0.88 + Math.random() * 0.24) * vulnMult('e'));
        B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
        wakeOnHit('e');
        return dmg;
    };

    disableAll();
    print(r.emoji + ' ' + r.name + ' uses ' + a.name + '!', 'b-system');

    if (a.kind === 'heal') {
        const hp = Math.floor(G.max_hp * (a.healPct || 0.25));
        G.hp = Math.min(G.max_hp, G.hp + hp);
        print('Recovered ' + hp + ' HP!', 'success');
        if (a.mpRestorePct) {
            const mp = Math.floor(G.max_mp * a.mpRestorePct);
            G.mp = Math.min(G.max_mp, G.mp + mp);
            print('Recovered ' + mp + ' MP!', 'success');
        }
        if (a.cleanse) cleanseNegativeFx('p');
        if (a.buff) applyBuff('p', a.buff);
        finish();
        return;
    }

    if (a.kind === 'buff') {
        if (a.buff) applyBuff('p', a.buff);
        else applyBuff('p', 'focus');
        finish();
        return;
    }

    if (a.kind === 'aoe') {
        B.enemies.forEach((en, i) => {
            if (B.enemy_hps[i] <= 0) return;
            B.enemy_idx = i;
            const dmg = doDamageToCurrent(a.pow || 45);
            print('  ' + en.name + ': ' + dmg + ' damage!', 'b-player');
            if (a.status && Math.random() < (a.statusChance || 0.35)) applyFx('e', a.status);
        });
        const fl = B.enemy_hps.findIndex(hp => hp > 0);
        B.enemy_idx = fl >= 0 ? fl : 0;
        finish();
        return;
    }

    // damage or status assist — choose target first when needed.
    const resolveTargeted = () => {
        const pow = a.kind === 'status' ? (a.pow || 28) : (a.pow || 65);
        const dmg = doDamageToCurrent(pow);
        print('Assist deals ' + dmg + ' damage!', 'b-player');
        if (a.status && Math.random() < (a.statusChance || 0.40)) applyFx('e', a.status);
        if (a.buff) applyBuff('p', a.buff);
        finish();
    };

    if (B.enemies.filter((_, i) => B.enemy_hps[i] > 0).length > 1) {
        selectTarget(idx => { B.enemy_idx = idx; disableAll(); resolveTargeted(); });
    } else {
        resolveTargeted();
    }
}

function doItemMenu() {
    const usable = G.inventory.filter(e => e.qty > 0);
    if (usable.length === 0) {
        print('You have no items.', 'danger');
        setTimeout(showBattleMenu, 800);
        return;
    }
    $ch.innerHTML = '';
    usable.forEach(entry => {
        const item = POTIONS.find(i => i.id === entry.id);
        const b = document.createElement('button');
        b.textContent = item.name + ' x' + entry.qty + '  —  ' + item.desc;
        b.onclick = () => useItem(item, entry);
        $ch.appendChild(b);
    });
    const back = document.createElement('button');
    back.textContent = '← Back';
    back.onclick = showBattleMenu;
    $ch.appendChild(back);
}

function useItem(item, entry) {
    disableAll();
    entry.qty--;
    // Restoration
    if (item.full) { G.hp = G.max_hp; G.mp = G.max_mp; }
    else {
        if (item.hp) G.hp = Math.min(G.max_hp, G.hp + item.hp);
        if (item.mp) G.mp = Math.min(G.max_mp, G.mp + item.mp);
    }
    // Curatives
    if (item.cure)    { item.cure.forEach(id => delete B.p_fx[id]); print('Status cured!', 'success'); }
    if (item.cureAll) {
        Object.keys(B.p_fx).forEach(id => { if (STATUS[id] && STATUS[id].neg) delete B.p_fx[id]; });
        print('All negative statuses cleared!', 'success');
    }
    // Buff
    if (item.buff) applyBuff('p', item.buff);
    print(G.name + ' used ' + item.name + '!', 'success');
    updateStats();
    updateBattlePanel();
    enemyTurn();
}

function doRun() {
    disableAll();
    if (Math.random() < 0.55) {
        print('You successfully fled from battle!', 'success');
        endBattle();
        setTimeout(afterFlee, 700);
    } else {
        print("Couldn't escape!", 'danger');
        enemyTurn();
    }
}

// ── Turn engine ───────────────────────────────────────────────
// Called at the start of every player turn
async function playerTurnStart() {
    if (!B) return;
    const dots = document.createElement('p');
    dots.className = 'narrator'; dots.textContent = '...';
    $out.appendChild(dots); $out.scrollTop = $out.scrollHeight;
    await delay(400);
    dots.remove();

    const r = processTurnStart('p');
    if (r === 'dead') {
        print('You succumb to your wounds...', 'danger');
        await delay(900); gameOver(); return;
    }
    if (r === 'skip') { await delay(400); enemyTurn(); return; }
    showBattleMenu();
}

async function enemyTurn() {
    if (!B) return;
    const dots = document.createElement('p');
    dots.className = 'narrator'; dots.textContent = '...';
    $out.appendChild(dots); $out.scrollTop = $out.scrollHeight;
    await delay(ENEMY_TURN_DELAY);
    dots.remove();

    // Each living enemy attacks in sequence
    for (let i = 0; i < B.enemies.length; i++) {
        if (B.enemy_hps[i] <= 0) continue;   // already dead — skip
        const en = B.enemies[i];
        B.enemy_idx = i;

        // Process this enemy's turn start (DoT / skip checks)
        const r = processTurnStart('e');
        if (r === 'dead') { setTimeout(winBattle, 400); return; }
        if (r === 'skip') continue;

        const move   = en.moves[Math.floor(Math.random() * en.moves.length)];
        const rawDmg = Math.floor(en.atk * (0.85 + Math.random() * 0.3) * atkMult('e') * vulnMult('p'));
        const allyTarget = chooseRecruitTarget();
        if (allyTarget) {
            ensureRecruitBattleState();
            const recMult = recruitDamageTakenMult(allyTarget);
            const recDmg = Math.max(1, Math.floor(rawDmg * recMult));
            const before = B.recruit_hps[allyTarget.id] ?? B.recruit_max_hps[allyTarget.id] ?? recruitMaxHp(allyTarget);
            B.recruit_hps[allyTarget.id] = Math.max(0, before - recDmg);
            updateBattlePanel();
            print(en.name + ' uses ' + move.name + ' against ' + allyTarget.name + '!  [' + recDmg + ' recruit damage]', 'b-enemy');
            if (B.recruit_hps[allyTarget.id] <= 0) print(allyTarget.name + ' is knocked out for the rest of this battle!', 'danger');
            await delay(350);
            continue;
        }
        const mit    = G.phy_def / (G.phy_def + 80);
        let dmg      = Math.max(1, Math.floor(rawDmg * (1 - mit)));
        if (B.p_fx.guard) dmg = Math.max(1, Math.floor(dmg * STATUS.guard.dmgTakenMult));
        G.hp = Math.max(0, G.hp - dmg);
        wakeOnHit('p');
        updateStats(); updateBattlePanel();
        print(en.name + ' uses ' + move.name + '!  [' + dmg + ' damage' + (mit > 0.05 ? ', -' + Math.floor(mit*100) + '% mitigated' : '') + (B.p_fx.guard ? ', guarded' : '') + ']', 'b-enemy');
        if (B.p_fx.thorns) {
            const thorn = Math.max(1, Math.floor(dmg * STATUS.thorns.thornsPct));
            B.enemy_hp = Math.max(0, B.enemy_hp - thorn);
            print('🌹 Thorns strike back for ' + thorn + ' damage!', 'success');
            updateBattlePanel();
            if (B.enemy_hp <= 0) { await delay(300); if (checkWin()) return; }
        }
        const resistMit = G.resist * 0.003;
        if (move.status && Math.random() < (move.statusChance || 0.25) * (1 - resistMit))
            applyFx('p', move.status);
        if (G.hp <= 0) {
            await delay(600); print('You have fallen...', 'danger');
            await delay(900); gameOver(); return;
        }
        await delay(350);
    }
    // Restore enemy_idx to first living enemy for player's turn
    const living = B.enemy_hps.findIndex(hp => hp > 0);
    if (living !== -1) B.enemy_idx = living;
    updateBattlePanel();
    playerTurnStart();
}

function checkWin() {
    if (B.enemy_hp <= 0) {
        // Advance to next living enemy
        const nextIdx = B.enemy_hps.findIndex((hp, i) => i > B.enemy_idx && hp > 0);
        if (nextIdx !== -1) {
            print(B.enemy.name + ' was defeated! Next enemy: ' + B.enemies[nextIdx].name, 'success');
            B.enemy_idx = nextIdx;
            updateBattlePanel();
            return false;
        }
        // All enemies dead
        setTimeout(winBattle, 550);
        return true;
    }
    return false;
}

async function winBattle() {
    const totalExp  = B.enemies.reduce((s, e) => s + e.exp, 0);
    const totalGold = B.enemies.reduce((s, e) => s + e.gold, 0);
    if (B.enemies.length > 1) {
        print('All enemies defeated!', 'success');
    } else {
        print(B.enemies[0].name + ' was defeated!', 'success');
    }
    G.exp += totalExp; G.gold += totalGold;
    print('Gained ' + totalExp + ' EXP  and  ' + totalGold + ' gold!', 'b-system');
    recordBattleAchievements(B.enemies);
    updateStats();
    while (G.exp >= G.next_exp) {
        if (G.total_lv + G.level_pts >= 100) {
            G.exp = Math.min(G.exp, Math.max(0, G.next_exp - 1));
            print('★ Level cap reached: Total Level 100 is the maximum.', 'b-system');
            break;
        }
        G.exp -= G.next_exp;
        G.level_pts++;
        G.stat_pts += 10;
        G.next_exp = 30 + 10 * G.total_lv;
        print('★  Level Up! +1 Level Point  +10 Stat Points — visit Character screen to spend them.  (Total Lv.' + G.total_lv + ')', 'b-system');
        updateStats();
    }
    const zone = _lastZone || town_center;
    endBattle();
    await delay(500);
    showChoices([
        ['Fight again', zone],
        ['Return to Town Center', town_center],
    ]);
}

function endBattle() { B = null; showBattlePanel(false); }

function gameOver() {
    endBattle(); clearOutput();
    print('Y O U   D I E D', 'danger');
    print('Your journey ends here, ' + G.name + '.', 'narrator');
    showChoices([['Start Over', () => location.reload()]]);
}

// SKILL SYSTEM
// ═══════════════════════════════════════════════════════════════
function checkSkillTier(src, data, newLv) {
    const tier = (data.skills || []).find(t => t[0] === newLv);
    if (!tier) return;
    if (tier[1].length === 1) {
        const sk = tier[1][0];
        if (!G.learned_skills.find(s => s.id === sk.id)) {
            G.learned_skills.push(sk);
            print('★ New skill unlocked: ' + sk.name + '!', 'b-system');
        }
    } else {
        G.pending_skill_picks.push({src, tier: newLv, opts: tier[1]});
    }
}

function cleanseNegativeFx(target) {
    const fx = target === 'p' ? B.p_fx : B.e_fx;
    let removed = 0;
    Object.keys(fx).forEach(id => {
        if (STATUS[id] && STATUS[id].neg) { delete fx[id]; removed++; }
    });
    if (removed) print('✨ Negative status effects cleansed!', 'success');
    return removed;
}

function paySkillExtraCost(sk) {
    if (!sk.hpCostPct) return;
    const hpCost = Math.max(1, Math.floor(G.max_hp * sk.hpCostPct));
    G.hp = Math.max(1, G.hp - hpCost);
    print('Blood price paid: ' + hpCost + ' HP.', 'danger');
}

function applySkillUtility(sk) {
    if (sk.cleanse) cleanseNegativeFx('p');
    if (sk.mpRestore) {
        const gain = Math.min(G.max_mp - G.mp, sk.mpRestore);
        G.mp = Math.min(G.max_mp, G.mp + sk.mpRestore);
        if (gain > 0) print('Recovered ' + gain + ' MP!', 'success');
    }
    if (sk.mpRestorePct) {
        const gain = Math.floor(G.max_mp * sk.mpRestorePct);
        G.mp = Math.min(G.max_mp, G.mp + gain);
        print('Recovered ' + gain + ' MP!', 'success');
    }
}

function skillDamageBase(sk) {
    let base = (sk.pow || 0) + G.phy_atk * 0.4 + G.mag_atk * 0.4;
    if (sk.hpCostPct) base *= 1.30;
    if (sk.execute && B.enemy && B.enemy_hp / B.enemy.hp <= sk.execute) base *= 1.75;
    return base;
}

function resolveSkill(sk) {
    const msg = G.name + ' uses ' + sk.name + '!';

    // Heal — no target needed
    if (sk.heal) {
        disableAll();
        G.mp = Math.max(0, G.mp - (sk.mp || 0));
        paySkillExtraCost(sk);
        const hp = Math.floor(G.max_hp * sk.heal);
        G.hp = Math.min(G.max_hp, G.hp + hp);
        print(msg + '  Recovered ' + hp + ' HP!', 'success');
        if (sk.buf) applyBuff('p', sk.buf);
        applySkillUtility(sk);
        updateStats(); updateBattlePanel();
        if (!B || B.enemy_hp <= 0) { if (checkWin()) return; }
        enemyTurn();
        return;
    }

    // AoE damage skill — hits all living enemies
    if (sk.aoe) {
        disableAll();
        G.mp = Math.max(0, G.mp - (sk.mp || 0));
        paySkillExtraCost(sk);
        print(msg + ' — ★ ALL ENEMIES', 'b-player');
        let totalDmg = 0;
        B.enemies.forEach((en, i) => {
            if (B.enemy_hps[i] <= 0) return;
            B.enemy_idx = i;
            const hits = sk.hits || 1;
            let dmgHere = 0;
            for (let h = 0; h < hits; h++) {
                const base = skillDamageBase(sk);
                const dmg  = Math.floor((base / hits) * (0.85 + Math.random() * 0.3) * vulnMult('e') * atkMult('p'));
                B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
                dmgHere += dmg;
            }
            wakeOnHit('e');
            print('  ' + en.name + ':  ' + dmgHere + ' dmg!' + (sk.st ? '  ' + STATUS[sk.st].icon : ''), 'b-player');
            if (sk.drain) {
                const heal = Math.floor(dmgHere * 0.35);
                G.hp = Math.min(G.max_hp, G.hp + heal);
                print('  Drained ' + heal + ' HP!', 'success');
            }
            if (sk.st && Math.random() < (sk.sc || 0.3)) applyFx('e', sk.st);
            totalDmg += dmgHere;
        });
        const fl = B.enemy_hps.findIndex(hp => hp > 0);
        B.enemy_idx = fl >= 0 ? fl : 0;
        if (sk.buf) applyBuff('p', sk.buf);
        applySkillUtility(sk);
        updateStats(); updateBattlePanel();
        if (checkWin()) return;
        enemyTurn();
        return;
    }

    // Single-target damage skill — pick target first
    selectTarget(idx => {
        B.enemy_idx = idx;
        disableAll();
        G.mp = Math.max(0, G.mp - (sk.mp || 0));
        paySkillExtraCost(sk);
        const hits  = sk.hits || 1;
        let totalDmg = 0;
        for (let i = 0; i < hits; i++) {
            const base = skillDamageBase(sk);
            const dmg  = Math.floor((base / hits) * (0.85 + Math.random() * 0.3) * vulnMult('e') * atkMult('p'));
            B.enemy_hp = Math.max(0, B.enemy_hp - dmg);
            totalDmg  += dmg;
        }
        wakeOnHit('e');
        const targetTag = B.enemies.length > 1 ? ' [vs ' + B.enemy.name + ']' : '';
        print(msg + targetTag + (hits > 1 ? ' (' + hits + ' hits)' : '') + '  [' + totalDmg + ' damage]', 'b-player');
        if (sk.drain) {
            const heal = Math.floor(totalDmg * 0.35);
            G.hp = Math.min(G.max_hp, G.hp + heal);
            print('Drained ' + heal + ' HP!', 'success');
        }
        if (sk.st && Math.random() < (sk.sc || 0.3)) applyFx('e', sk.st);
        if (sk.buf) applyBuff('p', sk.buf);
        applySkillUtility(sk);
        updateStats(); updateBattlePanel();
        if (checkWin()) return;
        enemyTurn();
    });
}

function recruitGroups() {

    RECRUIT_DATA.forEach(r => {
        if (!groups[r.anime]) groups[r.anime] = [];

    return groups;
}

function recruitBonusText(r) {
    return Object.entries(r.bonus || {}).map(([k,v]) => '+' + v + ' ' + k.toUpperCase()).join('  ');
}

function recruitAssistText(r) {
    const a = r.assist || {};
    const parts = [];
    if (a.kind) parts.push(a.kind.toUpperCase());
    if (a.pow) parts.push('Power ' + a.pow);
    if (a.healPct) parts.push('Heal ' + Math.round(a.healPct * 100) + '%');
    if (a.mpRestorePct) parts.push('MP +' + Math.round(a.mpRestorePct * 100) + '%');
    if (a.status) parts.push('inflicts ' + a.status);
    if (a.buff) parts.push('grants ' + a.buff);
    if (a.cleanse) parts.push('cleanse');
    return a.name + ' — ' + parts.join(' · ');
}

function recruit_category(anime) {
    ensureGameCollections();
    clearOutput();
    showBattlePanel(false);
    print(anime.toUpperCase() + ' — RECRUITS', 'highlight');
    print('Five main characters from this anime category. Buy them with gold, then toggle them active for battle support.', 'narrator');
    print('Gold: ' + G.gold + '   |   Total Level: ' + G.total_lv + '   |   Active: ' + G.active_recruits.length + ' / 3', 'info');
    print('');

    const list = RECRUIT_DATA.filter(r => r.anime === anime);
    $ch.innerHTML = '';
    list.forEach(r => {
        const owned = G.recruits.includes(r.id);
        const active = G.active_recruits.includes(r.id);
        const canBuy = !owned && G.gold >= r.cost && G.total_lv >= r.req;
        const b = document.createElement('button');
        b.style.whiteSpace = 'pre-wrap';
        b.style.lineHeight = '1.55';
        b.textContent =
            (owned ? (active ? '[ACTIVE] ' : '[RECRUITED] ') : '[HIRE] ') +
            r.emoji + '  ' + r.name + ' — ' + r.role + '\n' +
            'Cost: ' + r.cost + 'g  ·  Level Req: ' + r.req + '  ·  Bonus: ' + recruitBonusText(r) + '\n' +
            'Assist: ' + recruitAssistText(r) + '\n' +
            r.desc;

        if (!owned) {
            b.disabled = !canBuy;
            b.onclick = () => {
                G.gold -= r.cost;
                G.recruits.push(r.id);
                if (G.active_recruits.length < 3) G.active_recruits.push(r.id);
                applyStats(); updateStats();
                clearOutput();
                print(r.emoji + ' ' + r.name + ' joined your roster!', 'success');
                print('They were added to active support because there was an open slot.', 'info');
                showChoices([
                    ['← Back to ' + anime + ' recruits', () => recruit_category(anime)],
                    ['Recruitment Hall', recruitment_hall],
                    ['Town Center', town_center],
                ]);
            };
        } else {
            b.onclick = () => toggle_recruit_active(r.id, () => recruit_category(anime));
        }
        $ch.appendChild(b);
    });

    const hall = document.createElement('button');
    hall.textContent = '← Recruitment Hall';
    hall.onclick = recruitment_hall;
    $ch.appendChild(hall);
}

function toggle_recruit_active(id, returnFn) {
    ensureGameCollections();
    const r = getRecruit(id);
    if (!r || !G.recruits.includes(id)) return;
    const idx = G.active_recruits.indexOf(id);
    if (idx >= 0) {
        G.active_recruits.splice(idx, 1);
        applyStats(); updateStats();
        returnFn();
        return;
    }
    if (G.active_recruits.length >= 3) {
        clearOutput();
        print('Active recruit slots are full.', 'danger');
        print('Remove one active recruit before adding ' + r.name + '.', 'narrator');
        showChoices([
            ['Manage Active Recruits', recruit_manage],
            ['← Back', returnFn],
        ]);
        return;
    }
    G.active_recruits.push(id);
    applyStats(); updateStats();
    returnFn();
}

function recruit_manage() {
    ensureGameCollections();
    clearOutput();
    showBattlePanel(false);
    print('MANAGE ACTIVE RECRUITS', 'highlight');
    print('Choose up to 3 recruited characters to support you in battle.', 'narrator');
    print('Active: ' + G.active_recruits.length + ' / 3', 'info');
    print('');

    $ch.innerHTML = '';
    if (!G.recruits.length) {
        const p = document.createElement('p');
        p.className = 'narrator';
        p.textContent = 'No recruits yet. Hire characters from an anime category first.';
        $ch.appendChild(p);
    } else {
        G.recruits.map(getRecruit).filter(Boolean).forEach(r => {
            const active = G.active_recruits.includes(r.id);
            const b = document.createElement('button');
            b.style.whiteSpace = 'pre-wrap';

    hall.textContent = '← Recruitment Hall';
    hall.onclick = recruitment_hall;
    $ch.appendChild(hall);

    const back = document.createElement('button');
    back.textContent = '← Return to Town Center';
    back.onclick = town_center;
    $ch.appendChild(back);
}

            actives.forEach(sk => {
                const fxParts = [];
                if (sk.mp)   fxParts.push(sk.mp + ' MP');
                if (sk.pow)  fxParts.push('Power: ' + sk.pow);
                if (sk.hits && sk.hits > 1) fxParts.push('x' + sk.hits + ' hits');
                if (sk.st)   fxParts.push('→ ' + sk.st + ' (' + Math.round((sk.sc||0)*100) + '%)');
                if (sk.drain) fxParts.push('DRAIN 35%');
                if (sk.heal)  fxParts.push('HEAL ' + Math.round(sk.heal*100) + '% HP');
                if (sk.buf)   fxParts.push('self: ' + sk.buf);
                if (sk.cleanse) fxParts.push('CLEANSE');
                if (sk.mpRestore) fxParts.push('MP +' + sk.mpRestore);
                if (sk.mpRestorePct) fxParts.push('MP +' + Math.round(sk.mpRestorePct*100) + '%');
                if (sk.hpCostPct) fxParts.push('Blood Price ' + Math.round(sk.hpCostPct*100) + '% HP');
                if (sk.execute) fxParts.push('EXECUTE below ' + Math.round(sk.execute*100) + '% HP');
                const row = document.createElement('div');
                row.style.cssText = 'padding:6px 0;border-bottom:1px solid #111d2e';
                row.innerHTML = '<span style="color:#e8c84a;font-weight:700">' + sk.name + '</span>' +
                    (fxParts.length ? '  <span style="color:#48cae4;font-size:11px">' + fxParts.join('  ') + '</span>' : '') +
                    '<br><span style="color:#8aaac8;font-size:11px">' + sk.desc + '</span>';
                hdr.appendChild(row);
            });
            $ch.appendChild(hdr);
        }
        if (passives.length > 0) {
            const hdr2 = document.createElement('div');
            hdr2.className = 'cs-exp-row';
            hdr2.innerHTML = '<div class="cs-exp-label" style="color:#a78bfa">✦ PASSIVE SKILLS  (' + passives.length + ')  — always active</div>';
            passives.forEach(sk => {
                const bonParts = sk.bon ? Object.entries(sk.bon).map(([k,v]) => '+'+v+' '+k.toUpperCase()) : [];
                if (Array.isArray(sk.immune)) bonParts.push('IMMUNE: ' + sk.immune.join(', '));
                if (sk.spellBoost) bonParts.push('SPELL DMG +' + Math.round(sk.spellBoost * 100) + '%');
                if (sk.summonBoost) bonParts.push('RECRUIT ASSIST +' + Math.round(sk.summonBoost * 100) + '%');
                if (sk.craftDiscount) bonParts.push('SHOP DISCOUNT ' + Math.round(sk.craftDiscount * 100) + '%');
                if (sk.detection) bonParts.push('DETECTION +' + sk.detection);
                const row = document.createElement('div');
                row.style.cssText = 'padding:6px 0;border-bottom:1px solid #111d2e';
                row.innerHTML = '<span style="color:#a78bfa;font-weight:700">' + sk.name + '</span>' +
                    (bonParts.length ? '  <span style="color:#2ecc71;font-size:11px">' + bonParts.join('  ') + '</span>' : '') +
                    '<br><span style="color:#8aaac8;font-size:11px">' + sk.desc + '</span>';
                hdr2.appendChild(row);

    const back = document.createElement('button');
    back.textContent = '← Return to Town Center';
    back.onclick = town_center;
    back.style.marginTop = '8px';
    $ch.appendChild(back);

function character_screen() {
    clearOutput();
    showBattlePanel(false);
    const race = RACE_DATA[G.race_id];
    const expPct = Math.min(100, Math.floor((G.exp / G.next_exp) * 100));
    const jobLvTotal = G.jobs.reduce((s, j) => s + j.lv, 0);
    const racePct = Math.round((G.race_lv / 100) * 100);
    const jobPct  = Math.round((jobLvTotal  / 100) * 100);
    const pts = G.level_pts;

    // ── Header ──────────────────────────────────────────────────
    $ch.innerHTML = `
      <div class="cs-summary">
        <div>
          <div class="cs-char-name">${G.name}</div>
          <div class="cs-class-tag">${race.name} [${race.anime}]  ·  ${G.jobs.map(j=>JOB_DATA[j.id].name+' ['+JOB_DATA[j.id].anime+'] Lv.'+j.lv).join(' / ')}</div>

          <div class="cs-soul-lv">Total Level ${G.total_lv} / 100</div>

        </div>
      </div>
      <div class="cs-exp-row">
        <div class="cs-exp-label">Experience to next Level Point</div>
        <div class="cs-exp-track"><div class="cs-exp-fill" style="width:${expPct}%"></div></div>
        <div class="cs-exp-text">${G.exp} / ${G.next_exp} EXP &nbsp;·&nbsp; Gold: ${G.gold}</div>
      </div>`;

    // ── Level Breakdown bar (Racial vs Job) ─────────────────────
    const breakDiv = document.createElement('div');
    breakDiv.className = 'cs-exp-row';
    breakDiv.innerHTML =
        '<div class="cs-exp-label">Level Breakdown  —  Racial ' + G.race_lv + ' + Job ' + jobLvTotal + ' = ' + G.total_lv + ' / 100</div>' +
        '<div style="display:flex;height:10px;border:1px solid #1c3354;overflow:hidden;margin-top:3px">' +
        '  <div style="width:' + racePct + '%;background:linear-gradient(90deg,#7a0000,#ff4757)"></div>' +
        '  <div style="width:' + jobPct + '%;background:linear-gradient(90deg,#1a0050,#7f5af0)"></div>' +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;font-size:10px;color:#8aaac8;margin-top:3px">' +
        '  <span style="color:#ff4757">● Racial Levels: ' + G.race_lv + '</span>' +
        '  <span style="color:#7f5af0">Job Levels: ' + jobLvTotal + ' ●</span>' +
        '</div>';
    $ch.appendChild(breakDiv);

    const planDiv = document.createElement('div');
    planDiv.className = 'cs-exp-row';
    planDiv.innerHTML =
        '<div class="cs-exp-label" style="color:#e8c84a">YGGDRASIL BUILD TEMPLATE</div>' +
        '<div style="font-size:11px;color:#c0d0e0;line-height:1.6">15 levels in a base race or class → 10 levels in an advanced class → 10 levels in another specialist class → 5 levels in a rare class → continue stacking capped paths until Level 100.</div>';
    $ch.appendChild(planDiv);

    // ── Pending skill picks ──────────────────────────────────────
    G.pending_skill_picks.forEach((pick, pickIdx) => {
        const pickDiv = document.createElement('div');
        pickDiv.className = 'cs-exp-row';
        pickDiv.innerHTML = '<div class="cs-exp-label" style="color:#2ecc71">⚔ CHOOSE A SKILL  (Lv.' + pick.tier + ' ' + (pick.src === 'race' ? RACE_DATA[G.race_id].name : JOB_DATA[pick.src].name) + ')</div>';
        pick.opts.forEach(sk => {
            const sb = document.createElement('button');
            sb.className = 'btn-levelup';
            sb.style.cssText = 'width:100%;margin-top:4px;text-align:left';
            const typeTag = sk.type === 'p' ? '[PASSIVE]' : '[' + (sk.mp||0) + ' MP]';
            const fxTag   = sk.type === 'a' ? (sk.st ? '  →' + sk.st : '') + (sk.hits > 1 ? '  x'+sk.hits+' hits' : '') + (sk.drain ? '  DRAIN' : '') + (sk.heal ? '  HEAL' : '') : '';
            sb.textContent = typeTag + '  ' + sk.name + fxTag + '  —  ' + sk.desc;
            sb.onclick = () => {
                G.learned_skills.push(sk);
                G.pending_skill_picks.splice(pickIdx, 1);
                applyStats(); updateStats(); character_screen();
            };
            pickDiv.appendChild(sb);
        });
        $ch.appendChild(pickDiv);
    });

    // ── Level Point spending ─────────────────────────────────────
    if (pts > 0 && G.total_lv < 100) {
        const spendDiv = document.createElement('div');
        spendDiv.className = 'cs-exp-row';
        spendDiv.innerHTML = '<div class="cs-exp-label" style="color:#e8c84a">★ SPEND LEVEL POINT (' + pts + ' available)</div>';

        // Race option
        if (G.race_lv < race.max_lv) {
            const rb = document.createElement('button');
            rb.className = 'btn-levelup';
            rb.style.cssText = 'width:100%;margin-top:4px';
            rb.textContent = 'Race: ' + race.name + ' Lv.' + G.race_lv + ' → Lv.' + (G.race_lv + 1) + '  (max ' + race.max_lv + ')';
            rb.onclick = () => {
                if (G.total_lv >= 100) return;
                G.race_lv++; G.level_pts--;
                checkSkillTier('race', race, G.race_lv);
                applyStats(); updateStats(); character_screen();
            };
            spendDiv.appendChild(rb);
        }
        // Each job option
        G.jobs.forEach((job, idx) => {
            const jd = JOB_DATA[job.id];
            if (job.lv >= jd.max_lv) return;
            const jb = document.createElement('button');
            jb.className = 'btn-levelup';
            jb.style.cssText = 'width:100%;margin-top:4px';
            jb.textContent = jd.name + ' Lv.' + job.lv + ' → Lv.' + (job.lv + 1) + '  (max ' + jd.max_lv + ')';
            jb.onclick = () => {
                if (G.total_lv >= 100) return;
                G.jobs[idx].lv++; G.level_pts--;
                checkSkillTier(job.id, jd, G.jobs[idx].lv);
                applyStats(); updateStats(); character_screen();
            };
            spendDiv.appendChild(jb);
        });
        $ch.appendChild(spendDiv);
    }

    // ── YGGDRASIL Class Registry / hidden build paths ─────────────
    appendMiniClassRegistry();

    // ── Stat Point spending ──────────────────────────────────────
    if (G.stat_pts > 0) {
        const statSpendDiv = document.createElement('div');
        statSpendDiv.className = 'cs-exp-row';
        statSpendDiv.innerHTML = '<div class="cs-exp-label" style="color:#48cae4">⊕ SPEND STAT POINTS (' + G.stat_pts + ' available — +1 to any stat per point)</div>';
        const STAT_KEYS = [
            {key:'hp', label:'HP'},  {key:'mp', label:'MP'},
            {key:'pa', label:'PHY.ATK'}, {key:'pd', label:'PHY.DEF'},
            {key:'ag', label:'AGI'}, {key:'ma', label:'MAG.ATK'},
            {key:'md', label:'MAG.DEF'}, {key:'rs', label:'RESIST'},
            {key:'sp', label:'SPECIAL'},
        ];
        const spRow = document.createElement('div');
        spRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;margin-top:6px';
        STAT_KEYS.forEach(({key, label}) => {
            const sb = document.createElement('button');
            sb.className = 'btn-levelup';
            sb.style.cssText = 'width:auto;padding:5px 10px;font-size:11px';
            sb.textContent = '+1 ' + label + ' (bonus: ' + G.bonus[key] + ')';
            sb.onclick = () => { G.bonus[key]++; G.stat_pts--; applyStats(); updateStats(); character_screen(); };
            spRow.appendChild(sb);
        });
        statSpendDiv.appendChild(spRow);
        $ch.appendChild(statSpendDiv);
    }

    // ── 9 Stat bars ─────────────────────────────────────────────
    const STAT_BARS = [
        { label: 'HP  [Hit Points]',      val: G.max_hp,  max: 600 },
        { label: 'MP  [Mana Points]',      val: G.max_mp,  max: 500 },
        { label: 'PHY.ATK',               val: G.phy_atk, max: 250 },
        { label: 'PHY.DEF',               val: G.phy_def, max: 200 },
        { label: 'AGILITY',               val: G.agi,     max: 200 },
        { label: 'MAG.ATK',               val: G.mag_atk, max: 250 },
        { label: 'MAG.DEF',               val: G.mag_def, max: 200 },
        { label: 'RESIST',                val: G.resist,  max: 150 },
        { label: 'SPECIAL',               val: G.special, max: 150 },
    ];
    const barsDiv = document.createElement('div');
    barsDiv.className = 'cs-exp-row';
    barsDiv.innerHTML = '<div class="cs-exp-label">STATUS  —  comparative scale</div>';
    STAT_BARS.forEach(sb => {
        const pct = Math.min(100, Math.round((sb.val / sb.max) * 100));
        barsDiv.innerHTML +=
            '<div style="display:flex;align-items:center;gap:8px;margin-top:5px">' +
            '  <span style="min-width:120px;font-size:10px;font-weight:700;color:#8aaac8;letter-spacing:0.5px">' + sb.label + '</span>' +
            '  <div style="flex:1;background:#07090f;height:10px;border:1px solid #1c3354;overflow:hidden">' +
            '    <div style="width:' + pct + '%;height:100%;background:linear-gradient(90deg,#3a1a6a,#a78bfa)"></div>' +
            '  </div>' +
            '  <span style="min-width:35px;text-align:right;font-size:11px;color:#48cae4;font-weight:700">' + sb.val + '</span>' +
            '</div>';
    });
    $ch.appendChild(barsDiv);

    const back = document.createElement('button');
    back.textContent = '← Return to Town Center';
    back.onclick = town_center;
    back.style.marginTop = '8px';
    $ch.appendChild(back);

// ── Generic zone helpers ──────────────────────────────────────
function zone_encounter(pool, returnFn) {
    _lastZone = returnFn;
    const tier   = Math.floor(G.total_lv / 25);
    const scaled = pool.filter((_, i) => i <= tier);
    const active = scaled.length ? scaled : [pool[0]];
    const rand   = () => ({ ...active[Math.floor(Math.random() * active.length)] });
    // 60% single, 30% double, 10% triple
    const roll = Math.random();
    let group;
    if (roll < 0.60)      group = [rand()];
    else if (roll < 0.90) group = [rand(), rand()];
    else                  group = [rand(), rand(), rand()];
    startBattle(group);
}

function afterFlee() {
    const fn = _lastZone || town_center;
    clearOutput();
    print('You retreat, heart pounding.', 'narrator');
    showChoices([
        ['Try again',             fn],
        ['Return to Town Center', town_center],
    ]);
}

        ['← World Map', show_map],
    ]);
}

            if (unlocked) {
                mapRow.style.cursor = 'pointer';
                mapRow.onmouseenter = () => { mapRow.style.borderColor = '#e8c84a'; };
                mapRow.onmouseleave = () => { mapRow.style.borderColor = '#1c3354'; };
                mapRow.onclick = z.fn;
            }

            $ch.appendChild(mapRow);
        });
    });

    const back = document.createElement('button');
    back.textContent = '← Return to Town Center';
    back.onclick = town_center;
    back.style.marginTop = '10px';
    $ch.appendChild(back);
}

// ── Start ───────────────────────────────────────────────
updateStats();
pick_race();
</script>
</body>
</html>
