<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anime RPG — Fan Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #060911;
            background-image:
                radial-gradient(ellipse at 15% 60%, rgba(127,90,240,0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(0,180,216,0.05) 0%, transparent 55%);
            color: #c0d0e0;
            font-family: 'Rajdhani', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 28px 10px;
        }

        #game {
            width: 760px;
            background: linear-gradient(180deg, #0d1117 0%, #080c14 100%);
            border: 1px solid #1c3354;
            box-shadow:
                0 0 0 1px #0a1628,
                0 0 50px rgba(0,100,200,0.08),
                0 20px 80px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* ── Header ── */
        #game-header {
            background: linear-gradient(135deg, #090e1c 0%, #12082a 50%, #090e1c 100%);
            border-bottom: 1px solid #1c3354;
            padding: 20px 24px 15px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        #game-header::before {
            content: '';
            position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(
                90deg, transparent, transparent 48px,
                rgba(255,255,255,0.012) 48px, rgba(255,255,255,0.012) 49px
            );
        }
        #game-header::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, #e8c84a44, transparent);
        }
        #game-header h2 {
            font-family: 'Cinzel Decorative', serif;
            color: #e8c84a;
            font-size: 17px;
            letter-spacing: 5px;
            text-shadow: 0 0 24px rgba(232,200,74,0.55), 0 0 50px rgba(232,200,74,0.2);
            margin: 0 0 5px;
            position: relative;
        }
        #game-header .subtitle {
            font-size: 9px;
            color: #2e5070;
            letter-spacing: 7px;
            text-transform: uppercase;
            font-family: 'Rajdhani', monospace;
            font-weight: 600;
            position: relative;
        }

        /* ── Stat Bar ── */
        #stats-bar {
            display: grid; grid-template-columns: repeat(6, 1fr);
            font-size: 11px;
            background: #060911;
            border-bottom: 1px solid #111d2e;
        }
        .stat-cell {
            text-align: center;
            padding: 9px 4px;
            border-right: 1px solid #111d2e;
        }
        .stat-cell:last-child { border-right: none; }
        .stat-cell .lbl {
            display: block; color: #2e5070; font-size: 8px;
            letter-spacing: 1.5px; text-transform: uppercase;
            font-weight: 700; margin-bottom: 2px;
        }
        .stat-cell .val { color: #e8c84a; font-weight: 700; font-size: 14px; }

        /* ── Game Body ── */
        #game-body { padding: 16px 20px 22px; }

        /* ── Battle Panel ── */
        #battle-panel {
            display: none; margin-bottom: 14px;
            border: 1px solid #1c3354;
            overflow: hidden;
        }
        .bp-row {
            display: flex; align-items: center;
            padding: 13px 18px;
            border-bottom: 1px solid #0e1a2a;
        }
        .bp-row.enemy-row { background: linear-gradient(90deg, #180808 0%, #0d0d16 100%); }
        .bp-row.player-row { background: linear-gradient(90deg, #06101a 0%, #0d0d16 100%); }
        .bp-row.recruit-row { background: linear-gradient(90deg, #080b18 0%, #0d0d16 100%); border-top: 1px solid #0e1a2a; }
        .recruit-col { color: #a78bfa; text-shadow: 0 0 14px rgba(167,139,250,0.4); }
        .bar-hp-r { background: linear-gradient(90deg, #31105f, #a78bfa); box-shadow: 0 0 8px rgba(167,139,250,0.45); }
        .recruit-ko { opacity: 0.38; filter: grayscale(0.7); }
        .bp-emoji {
            font-size: 44px; line-height: 1; min-width: 56px; text-align: center;
            filter: drop-shadow(0 0 10px rgba(255,71,87,0.35));
        }
        .bp-info { flex: 1; margin-left: 18px; }
        .bp-name {
            font-size: 14px; font-weight: 700; margin-bottom: 7px;
            font-family: 'Rajdhani', monospace; letter-spacing: 1px;
        }
        .enemy-col { color: #ff4757; text-shadow: 0 0 14px rgba(255,71,87,0.45); }
        .player-col { color: #00b4d8; text-shadow: 0 0 14px rgba(0,180,216,0.45); }
        .bar-label {
            font-size: 8px; color: #2e5070; margin-bottom: 3px;
            letter-spacing: 1.5px; font-weight: 700; text-transform: uppercase;
        }
        .bar-track {
            background: #07090f; height: 11px;
            border: 1px solid #1c3354; margin-bottom: 6px;
            overflow: hidden;
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
        .bar-hp-e { background: linear-gradient(90deg, #7a0000, #ff4757); box-shadow: 0 0 8px rgba(255,71,87,0.5); }
        .bar-hp-p { background: linear-gradient(90deg, #005020, #2ecc71); box-shadow: 0 0 8px rgba(46,204,113,0.4); }
        .bar-mp-p { background: linear-gradient(90deg, #1a0050, #7f5af0); box-shadow: 0 0 8px rgba(127,90,240,0.45); }
        .bar-text  { font-size: 10px; color: #2e5070; margin-bottom: 6px; font-weight: 600; }

        /* ── Output ── */
        #output {
            min-height: 220px; max-height: 300px; overflow-y: auto;
            border: 1px solid #111d2e;
            padding: 13px 18px; margin-bottom: 12px;
            background: #050810;
            font-size: 13px; line-height: 1.9;
        }
        #output::-webkit-scrollbar { width: 3px; }
        #output::-webkit-scrollbar-track { background: #050810; }
        #output::-webkit-scrollbar-thumb { background: #1c3354; border-radius: 2px; }
        #output p { margin: 0; }

        .narrator  { color: #5a7a98; }
        .highlight { color: #e8c84a; font-weight: 700; }
        .danger    { color: #ff4757; font-weight: 700; letter-spacing: 0.5px; }
        .success   { color: #2ecc71; font-weight: 600; }
        .info      { color: #00b4d8; }
        .b-player  { color: #48cae4; }
        .b-enemy   { color: #ff6b81; }
        .b-system  { color: #e8c84a; font-weight: 600; }

        /* ── Choices ── */
        #choices { display: flex; flex-direction: column; gap: 5px; }
        .btn-row { display: flex; gap: 5px; }
        button {
            flex: 1;
            background: #0a0f1c;
            color: #8aaac8;
            border: 1px solid #1c3354;
            padding: 10px 15px;
            font-family: 'Rajdhani', monospace;
            font-size: 13px; font-weight: 600;
            cursor: pointer; text-align: left;
            transition: all 0.14s ease;
            line-height: 1.3;
            letter-spacing: 0.3px;
        }
        button::before { content: '▸  '; color: #1c3354; transition: color 0.14s; }
        button:hover:not(:disabled) {
            background: #0e1628;
            color: #ffffff;
            border-color: #e8c84a;
            box-shadow: 0 0 16px rgba(232,200,74,0.08), inset 0 0 16px rgba(232,200,74,0.025);
            transform: translateX(2px);
        }
        button:hover:not(:disabled)::before { color: #e8c84a; }
        button:disabled { opacity: 0.28; cursor: default; }

        button.battle-btn {
            text-align: center;
            background: #07091a;
            border-color: #1c3354;
            font-size: 13px; letter-spacing: 0.5px;
        }
        button.battle-btn::before { content: ''; }
        button.battle-btn:hover:not(:disabled) {
            background: #0c1030;
            border-color: #7f5af0;
            box-shadow: 0 0 20px rgba(127,90,240,0.15);
            transform: none;
        }

        /* ── Name Input ── */
        #name-form { display: flex; gap: 8px; align-items: center; }
        input[type="text"] {
            background: #070b14; color: #e8c84a;
            border: 1px solid #1c3354;
            padding: 10px 13px;
            font-family: 'Rajdhani', monospace;
            font-size: 14px; font-weight: 700;
            width: 65%; outline: none;
        }
        input[type="text"]:focus {
            border-color: #e8c84a;
            box-shadow: 0 0 10px rgba(232,200,74,0.1);
        }

        /* ── Shop ── */
        .shop-section {
            color: #e8c84a; font-size: 10px;
            letter-spacing: 2px; margin: 6px 0 3px;
            font-weight: 700; text-transform: uppercase;
        }

        /* ── Status Badges ── */
        .sfx-row { min-height: 18px; margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
        .sfx {
            padding: 1px 7px; font-size: 10px; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.07); white-space: nowrap;
            font-family: 'Rajdhani', monospace; letter-spacing: 0.3px;
        }
        .sfx-burn      { background:#2d0a00; color:#ff6b35; border-color:#ff6b3540; }
        .sfx-poison    { background:#160020; color:#c77dff; border-color:#c77dff40; }
        .sfx-bleed     { background:#200000; color:#ff4757; border-color:#ff475740; }
        .sfx-stun      { background:#1e1a00; color:#ffd166; border-color:#ffd16640; }
        .sfx-sleep     { background:#000c20; color:#74b9ff; border-color:#74b9ff40; }
        .sfx-freeze    { background:#000c18; color:#a8dadc; border-color:#a8dadc40; }
        .sfx-paralysis { background:#1e0e00; color:#fca311; border-color:#fca31140; }
        .sfx-fear      { background:#0c0c0c; color:#8d99ae; border-color:#8d99ae40; }
        .sfx-doom      { background:#140000; color:#ef233c; border-color:#ef233c40; }
        .sfx-petrify   { background:#0e0e0e; color:#dee2e6; border-color:#dee2e640; }
        .sfx-weaken    { background:#1e0010; color:#f72585; border-color:#f7258540; }
        .sfx-bravery   { background:#001408; color:#06d6a0; border-color:#06d6a040; }
        .sfx-haste     { background:#001418; color:#48cae4; border-color:#48cae440; }
        .sfx-confusion { background:#100020; color:#b5179e; border-color:#b5179e40; }
        .sfx-guard     { background:#00121e; color:#90e0ef; border-color:#90e0ef40; }
        .sfx-regen     { background:#001a0f; color:#57cc99; border-color:#57cc9940; }
        .sfx-focus     { background:#101000; color:#ffd60a; border-color:#ffd60a40; }
        .sfx-thorns    { background:#1a0012; color:#ff70a6; border-color:#ff70a640; }
        .sfx-vulnerable{ background:#1b0b00; color:#ffb703; border-color:#ffb70340; }
        .sfx-marked    { background:#0d001a; color:#c77dff; border-color:#c77dff40; }

        /* ── Character Screen ── */
        .cs-summary {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 10px 14px; background: #060c18;
            border: 1px solid #1c3354; margin-bottom: 6px;
        }
        .cs-char-name { color: #e8c84a; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
        .cs-class-tag { color: #8ab4cc; font-size: 11px; margin-top: 2px; }
        .cs-soul-block { text-align: right; }
        .cs-soul-lv { color: #a78bfa; font-size: 14px; font-weight: 700; letter-spacing: 1px; }
        .cs-soul-sub { color: #9ab8d0; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
        .cs-exp-row {
            padding: 7px 14px; background: #060c18;
            border: 1px solid #1c3354; border-top: none; margin-bottom: 8px;
        }
        .cs-exp-label { font-size: 10px; color: #8aaac8; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; }
        .cs-exp-track { background: #07090f; height: 8px; border: 1px solid #1c3354; overflow: hidden; }
        .cs-exp-fill  { background: linear-gradient(90deg, #5a2a8a, #a78bfa); height: 100%; transition: width 0.4s; }
        .cs-exp-text  { font-size: 10px; color: #8aaac8; margin-top: 3px; }

        .stat-row {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 14px; background: #07090f;
            border: 1px solid #111d2e; margin-bottom: 4px;
            transition: border-color 0.14s;
        }
        .stat-row:hover { border-color: #1c3354; }
        .sr-icon { font-size: 15px; min-width: 20px; text-align: center; }
        .sr-name {
            color: #e8c84a; font-weight: 700; font-size: 11px;
            letter-spacing: 1px; min-width: 110px; text-transform: uppercase;
        }
        .sr-level { color: #7f5af0; font-size: 12px; font-weight: 700; min-width: 38px; }
        .sr-val { color: #8aaac8; font-size: 11px; flex: 1; }
        .sr-val strong { color: #48cae4; font-size: 12px; }
        .sr-next { color: #8aaac8; font-size: 10px; min-width: 80px; letter-spacing: 0.3px; }
        .sr-cost { font-size: 11px; font-weight: 700; min-width: 60px; text-align: right; }
        .can-afford  { color: #2ecc71; }
        .cant-afford { color: #e74c3c; }

        .btn-levelup {
            flex: none; width: 88px;
            background: #0c1030; border: 1px solid #3a2080;
            color: #a78bfa; font-size: 11px; font-weight: 700;
            padding: 6px 8px; cursor: pointer; text-align: center;
            font-family: 'Rajdhani', monospace; letter-spacing: 0.5px;
            transition: all 0.14s;
        }
        .btn-levelup::before { content: '' !important; }
        .btn-levelup:hover:not(:disabled) {
            background: #18104a; border-color: #a78bfa;
            color: #fff; box-shadow: 0 0 14px rgba(127,90,240,0.3);
            transform: none !important;
        }
        .btn-levelup:disabled { opacity: 0.22; cursor: default; }

        /* ── Low HP pulse ── */
        @keyframes hp-pulse {
            0%, 100% { filter: brightness(0.85); }
            50%       { filter: brightness(1.4); }
        }
        .bar-hp-p.low-hp {
            animation: hp-pulse 1s ease-in-out infinite;
            background: linear-gradient(90deg, #6a0000, #ff4757);
        }

        /* ── Divider ── */
        .zone-divider { border: none; border-top: 1px solid #111d2e; margin: 10px 0; }

        /* ── Settings Button ── */
        #settings-btn {
            position: absolute; top: 50%; right: 18px;
            transform: translateY(-50%);
            background: rgba(10,15,28,0.8); color: #e8c84a;
            border: 1px solid #2e4070; font-size: 17px;
            cursor: pointer; padding: 5px 10px; border-radius: 4px;
            z-index: 50; line-height: 1; transition: background 0.2s;
        }
        #settings-btn:hover { background: #1c3354; }

        /* ── Settings Panel ── */
        #settings-panel {
            display: none; position: fixed; top: 0; right: 0; bottom: 0;
            width: 310px; background: #080c14;
            border-left: 1px solid #1c3354;
            z-index: 9999; overflow-y: auto; padding: 18px 18px 30px;
            box-shadow: -8px 0 40px rgba(0,0,0,0.85);
            font-family: 'Rajdhani', monospace;
        }
        #settings-panel.open { display: block; }
        .sp-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #1c3354;
        }
        .sp-title {
            font-family: 'Cinzel Decorative', serif; color: #e8c84a;
            font-size: 13px; letter-spacing: 3px;
        }
        .sp-close {
            color: #ff4757; background: none; border: none;
            font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px;
        }
        .sp-section { margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #111d2e; }
        .sp-section h3 {
            color: #00b4d8; font-size: 10px; letter-spacing: 2.5px;
            text-transform: uppercase; font-weight: 700; margin-bottom: 10px;
        }
        .sp-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .sp-label { color: #5a7a98; font-size: 12px; min-width: 90px; }
        .sp-slider { flex: 1; accent-color: #e8c84a; cursor: pointer; }
        .sp-val { color: #e8c84a; font-size: 12px; min-width: 38px; text-align: right; }
        .sp-select {
            flex: 1; background: #0a0f1c; color: #8aaac8;
            border: 1px solid #1c3354; padding: 5px 7px;
            font-family: 'Rajdhani', monospace; font-size: 13px;
        }
        .sp-btn {
            background: #0a0f1c; color: #8aaac8; border: 1px solid #1c3354;
            padding: 6px 10px; font-family: 'Rajdhani', monospace;
            font-size: 12px; cursor: pointer; transition: background 0.15s, color 0.15s;
        }
        .sp-btn:hover, .sp-btn.active { background: #1c3354; color: #e8c84a; border-color: #e8c84a; }
        .music-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 8px; }
        .lvl-ctrl { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
        .lvl-ctrl label { color: #5a7a98; font-size: 11px; flex: 1; }
        .lvl-ctrl .lv-num { color: #e8c84a; font-size: 13px; min-width: 28px; text-align: center; font-weight: 700; }
        .lvl-ctrl button {
            background: #0a0f1c; color: #8aaac8; border: 1px solid #1c3354;
            width: 26px; height: 26px; cursor: pointer; font-size: 15px; line-height: 1;
        }
        .lvl-ctrl button:hover { color: #e8c84a; background: #1c3354; }
        .save-msg { font-size: 11px; margin-top: 6px; min-height: 14px; }
    </style>
</head>
<body>
<div id="game">
    <div id="game-header">
        <h2>⚔ ANIME RPG ⚔</h2>
        <div class="subtitle">異世界 &nbsp;·&nbsp; Fan Game &nbsp;·&nbsp; 闘え</div>
        <button id="settings-btn" onclick="toggleSettings()" title="Settings">⚙</button>
    </div>

    <!-- Settings Panel (fixed overlay) -->
    <div id="settings-panel">
        <div class="sp-header">
            <span class="sp-title">SETTINGS</span>
            <button class="sp-close" onclick="toggleSettings()">✕</button>
        </div>

        <div class="sp-section">
            <h3>Display</h3>
            <div class="sp-row">
                <span class="sp-label">Text Size</span>
                <input type="range" class="sp-slider" id="sz-slider" min="11" max="20" value="13"
                       oninput="applyTextSize(this.value)">
                <span class="sp-val" id="sz-val">13px</span>
            </div>
            <div class="sp-row">
                <span class="sp-label">Font</span>
                <select class="sp-select" onchange="applyFont(this.value)">
                    <option value="'Rajdhani',monospace">Rajdhani (Default)</option>
                    <option value="'Courier New',monospace">Courier New</option>
                    <option value="Georgia,serif">Georgia</option>
                    <option value="Arial,sans-serif">Arial</option>
                    <option value="Verdana,sans-serif">Verdana</option>
                    <option value="'Times New Roman',serif">Times New Roman</option>
                </select>
            </div>
            <div class="sp-row">
                <span class="sp-label">Box Height</span>
                <input type="range" class="sp-slider" id="oh-slider" min="160" max="520" value="300" step="20"
                       oninput="applyOutputHeight(this.value)">
                <span class="sp-val" id="oh-val">300px</span>
            </div>
        </div>

        <div class="sp-section">
            <h3>Music</h3>
            <div class="music-grid">
                <button class="sp-btn" data-track="naruto"      onclick="MusicSystem.play('naruto')">🍃 Naruto</button>
                <button class="sp-btn" data-track="bleach"      onclick="MusicSystem.play('bleach')">⚔ Bleach</button>
                <button class="sp-btn" data-track="onepiece"    onclick="MusicSystem.play('onepiece')">🏴‍☠️ One Piece</button>
                <button class="sp-btn" data-track="demonslayer" onclick="MusicSystem.play('demonslayer')">🌸 Demon Slayer</button>
                <button class="sp-btn" data-track="jjk"         onclick="MusicSystem.play('jjk')">👁 JJK</button>
                <button class="sp-btn" data-track="mha"         onclick="MusicSystem.play('mha')">💥 MHA</button>
                <button class="sp-btn" data-track="dbz"         onclick="MusicSystem.play('dbz')">🔥 DBZ</button>
                <button class="sp-btn" data-track="hxh"         onclick="MusicSystem.play('hxh')">🎭 HxH</button>
                <button class="sp-btn" data-track="battle"      onclick="MusicSystem.play('battle')">⚡ Battle</button>
                <button class="sp-btn" data-track="town"        onclick="MusicSystem.play('town')">🏰 Town</button>
            </div>
            <div class="sp-row">
                <span class="sp-label">Volume</span>
                <input type="range" class="sp-slider" id="vol-slider" min="0" max="100" value="20"
                       oninput="MusicSystem.setVolume(+this.value); document.getElementById('vol-val').textContent=this.value">
                <span class="sp-val" id="vol-val">20</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
                <button class="sp-btn" onclick="MusicSystem.stop()">⏹ Stop</button>
                <span id="now-playing" style="color:#5a7a98;font-size:11px;flex:1;text-align:right">No music</span>
            </div>
        </div>

        <div class="sp-section">
            <h3>Battle Speed</h3>
            <div class="sp-row">
                <span class="sp-label">Turn Delay</span>
                <input type="range" class="sp-slider" id="spd-slider" min="100" max="1400" value="750" step="50"
                       oninput="applyBattleSpeed(+this.value)">
                <span class="sp-val" id="spd-val">0.75s</span>
            </div>
        </div>

        <div class="sp-section">
            <h3>Testing — Level Control</h3>
            <div id="lvl-ctrl-area" style="margin-bottom:8px"></div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
                <button class="sp-btn" onclick="devGold(100)">+100g</button>
                <button class="sp-btn" onclick="devGold(1000)">+1000g</button>

        <div class="stat-cell"><span class="lbl">GOLD</span><span class="val" id="s-gold">0</span></div>

    <div id="game-body">
        <div id="battle-panel">
            <!-- Enemy rows (rebuilt dynamically for multi-enemy) -->
            <div id="b-enemy-area">
            <div class="bp-row enemy-row">
                <div class="bp-emoji" id="b-e-emoji">👹</div>
                <div class="bp-info">
                    <div class="bp-name enemy-col" id="b-e-name">Enemy</div>
                    <div class="bar-label">HP</div>
                    <div class="bar-track"><div class="bar-fill bar-hp-e" id="b-e-bar"></div></div>
                    <div class="bar-text" id="b-e-hp">100 / 100</div>
                    <div class="sfx-row" id="b-e-sfx"></div>
                </div>
            </div>
            </div>
            <!-- Player row -->
            <div class="bp-row player-row">
                <div class="bp-info">
                    <div class="bp-name player-col" id="b-p-name">Player</div>
                    <div class="bar-label">HP</div>
                    <div class="bar-track"><div class="bar-fill bar-hp-p" id="b-p-hp-bar"></div></div>
                    <div class="bar-text" id="b-p-hp">100 / 100</div>
                    <div class="bar-label">MP</div>
                    <div class="bar-track"><div class="bar-fill bar-mp-p" id="b-p-mp-bar"></div></div>
                    <div class="bar-text" id="b-p-mp">100 / 100</div>
                    <div class="sfx-row" id="b-p-sfx"></div>
                </div>

        <div id="output"></div>
        <div id="choices"></div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// PLAYER STATE
// ═══════════════════════════════════════════════════════════════
const G = {
    name: '',
    // ── Overlord character system ────────────────────────────
    race_id: 0,
    jobs: [],           // [{id, lv}] — YGGDRASIL-style multi-class build paths
    race_lv: 0,
    total_lv: 0,        // race_lv + sum(jobs[].lv)  ·  max 100
    level: 0,           // alias for total_lv — keeps zone gating working
    level_pts: 0,       // unspent level points (earned from EXP)
    stat_pts: 0,        // free stat points — 10 per level-up, spend anywhere
    bonus: { hp:0, mp:0, pa:0, pd:0, ag:0, ma:0, md:0, rs:0, sp:0 },
    learned_skills: [],       // array of learned skill objects
    pending_skill_picks: [],  // [{src:'race'|jobId, tier:lv, opts:[...]}]
    achievements: { flags: [], defeated: {}, totalKills: 0, secret_research: 0 },
    class_unlocks: [],     // discovered hidden / rare job ids
    exp: 0, next_exp: 100,
    gold: 0,
    // ── 9 Overlord stats (computed by applyStats) ───────────
    hp: 80, max_hp: 80,
    mp: 40, max_mp: 40,
    phy_atk: 5, phy_def: 5,
    agi: 5,
    mag_atk: 5, mag_def: 5,
    resist: 5, special: 5,
    // ── Battle system compat aliases ─────────────────────────
    atk: 5, int_stat: 5,
    weapon: null,
    spells: [],
    inventory: [],
    recruits: [],          // purchased anime companions by id
    active_recruits: [],   // up to 3 support companions active in battle
};

// Active battle state — null when not fighting
let B = null;
// Persists the zone return function across endBattle (which nulls B)
let _lastZone = null;

function ensureGameCollections() {
    if (!Array.isArray(G.recruits)) G.recruits = [];
    if (!Array.isArray(G.active_recruits)) G.active_recruits = [];
    if (!G.achievements || typeof G.achievements !== 'object') G.achievements = {};
    if (!Array.isArray(G.achievements.flags)) G.achievements.flags = [];
    if (!G.achievements.defeated || typeof G.achievements.defeated !== 'object') G.achievements.defeated = {};
    if (typeof G.achievements.totalKills !== 'number') G.achievements.totalKills = 0;
    if (typeof G.achievements.secret_research !== 'number') G.achievements.secret_research = 0;
    if (!Array.isArray(G.class_unlocks)) G.class_unlocks = [];
    G.recruits = [...new Set(G.recruits)];
    G.active_recruits = [...new Set(G.active_recruits)].filter(id => G.recruits.includes(id)).slice(0, 3);
    G.achievements.flags = [...new Set(G.achievements.flags)];
    G.class_unlocks = [...new Set(G.class_unlocks.map(Number).filter(n => !Number.isNaN(n)))];
}

function getRecruit(id) {
    return RECRUIT_DATA.find(r => r.id === id);
}

function getActiveRecruits() {
    ensureGameCollections();
    return G.active_recruits.map(getRecruit).filter(Boolean);
}

function recruitMaxHp(r) {
    const b = r && r.bonus ? r.bonus : {};
    const roleBonus = (b.hp || 0) + Math.floor(((b.pd || 0) + (b.rs || 0)) * 2.5) + Math.floor((b.sp || 0) * 1.5);
    return Math.max(70, Math.floor(95 + (r.req || 1) * 3 + roleBonus + (r.cost || 0) / 35));
}

function recruitDamageTakenMult(r) {
    const b = r && r.bonus ? r.bonus : {};
    const armor = (b.pd || 0) + (b.rs || 0) + Math.floor((b.hp || 0) / 10);
    return Math.max(0.45, 1 - armor * 0.018);
}

function getBattleReadyRecruits() {
    const active = getActiveRecruits();
    if (!B || !B.recruit_hps) return active;
    return active.filter(r => (B.recruit_hps[r.id] ?? recruitMaxHp(r)) > 0);
}

function chooseRecruitTarget() {
    const living = getBattleReadyRecruits();
    if (!living.length) return null;
    return Math.random() < 0.30 ? living[Math.floor(Math.random() * living.length)] : null;
}

function buildRecruitBattleState() {
    const hps = {}, max = {};
    getActiveRecruits().forEach(r => {
        max[r.id] = recruitMaxHp(r);
        hps[r.id] = max[r.id];
    });
    return { hps, max };
}

function ensureRecruitBattleState() {
    if (!B) return;
    if (!B.recruit_hps) B.recruit_hps = {};
    if (!B.recruit_max_hps) B.recruit_max_hps = {};
    getActiveRecruits().forEach(r => {
        if (!B.recruit_max_hps[r.id]) B.recruit_max_hps[r.id] = recruitMaxHp(r);
        if (typeof B.recruit_hps[r.id] !== 'number') B.recruit_hps[r.id] = B.recruit_max_hps[r.id];
    });
}

// ── YGGDRASIL build / hidden class helpers ─────────────────────
function getPassiveScalar(key) {
    ensureGameCollections();
    return G.learned_skills.reduce((sum, sk) => sum + (Number(sk[key]) || 0), 0);
}

function priceOf(item) {
    const discount = Math.min(0.35, getPassiveScalar('craftDiscount'));
    return Math.max(1, Math.floor((item.cost || 0) * (1 - discount)));
}

function hasStatusImmunity(target, statusId) {
    if (target !== 'p') return false;
    return G.learned_skills.some(sk => sk.type === 'p' && Array.isArray(sk.immune) && sk.immune.includes(statusId));
}

function hasAchievement(flag) {
    ensureGameCollections();
    return G.achievements.flags.includes(flag);
}

function grantAchievement(flag, label) {
    ensureGameCollections();
    if (G.achievements.flags.includes(flag)) return false;
    G.achievements.flags.push(flag);
    if (label) print('◆ Achievement unlocked: ' + label, 'b-system');
    return true;
}

function grantResearchFlags() {
    const n = G.achievements.secret_research || 0;
    if (n >= 1) grantAchievement('secret_research_1');
    if (n >= 3) grantAchievement('secret_research_3');
    if (n >= 5) grantAchievement('secret_research_5');
}

function recordBattleAchievements(enemies) {
    ensureGameCollections();
    enemies.forEach(en => {
        G.achievements.totalKills++;
        G.achievements.defeated[en.name] = (G.achievements.defeated[en.name] || 0) + 1;
    });
    if (G.achievements.totalKills >= 5)  grantAchievement('monster_slayer_5',  'Monster Slayer I — 5 enemies defeated');
    if (G.achievements.totalKills >= 10) grantAchievement('monster_slayer_10', 'Monster Slayer II — 10 enemies defeated');
    if (G.achievements.totalKills >= 25) grantAchievement('monster_slayer_25', 'Monster Slayer III — 25 enemies defeated');
    discoverAvailableHiddenJobs(true);
}

function getJobLevel(jobId) {
    const id = Number(jobId);
    const entry = G.jobs.find(j => Number(j.id) === id);
    return entry ? entry.lv : 0;
}

function getAnimeJobLevelTotal(anime) {
    return G.jobs.reduce((sum, j) => {
        const jd = JOB_DATA[j.id];
        return jd && jd.anime === anime ? sum + j.lv : sum;
    }, 0);
}

function getHighestAnimeJobLevel(anime) {
    return G.jobs.reduce((best, j) => {
        const jd = JOB_DATA[j.id];
        return jd && jd.anime === anime ? Math.max(best, j.lv) : best;
    }, 0);
}

function ownsJob(jobId) {
    return G.jobs.some(j => Number(j.id) === Number(jobId));
}

function classTierLabel(j) {
    const tier = j.class_tier || 'Base';
    return tier.toUpperCase() + ' CLASS · max ' + j.max_lv + ' levels';
}

function _jobNameById(id) {
    const j = JOB_DATA[Number(id)];
    return j ? j.name : ('Job #' + id);
}

function jobPrereqText(id, j) {
    const tier = j.class_tier || 'Base';
    const p = j.prereq || {};
    if (tier === 'Base') return 'Starting Base job — no prerequisite.';
    const parts = [];
    if (Array.isArray(p.jobLevels)) {
        p.jobLevels.forEach(req => parts.push(_jobNameById(req.id) + ' Lv.' + req.lv));
    }
    if (Array.isArray(p.anyJobLevels)) {
        p.anyJobLevels.forEach(req => {
            const names = (req.ids || []).map(_jobNameById).join(' OR ');
            parts.push('one of: ' + names + ' at Lv.' + req.lv);
        });
    }
    if (p.secretResearch) parts.push('Hidden Research ' + p.secretResearch);
    if (p.totalKills) parts.push(p.totalKills + ' total monster kills');
    if (Array.isArray(p.achievements)) {
        p.achievements.forEach(flag => {
            if (flag === 'secret_research_3') return;
            if (flag === 'monster_slayer_10') return;
            parts.push(flag.replace(/_/g, ' '));
        });
    }
    return parts.length ? parts.join(' + ') : 'No prerequisite.';
}

function meetsJobPrereqs(id, j) {
    ensureGameCollections();
    const p = j.prereq || {};
    if (G.total_lv < (j.unlock_lv || 0)) return false;
    if (p.raceAnime && (!RACE_DATA[G.race_id] || RACE_DATA[G.race_id].anime !== p.raceAnime)) return false;
    if (p.anySameAnimeJobLevel && getHighestAnimeJobLevel(j.anime) < p.anySameAnimeJobLevel) return false;
    if (p.sameAnimeJobLevelTotal && getAnimeJobLevelTotal(j.anime) < p.sameAnimeJobLevelTotal) return false;
    if (Array.isArray(p.jobLevels)) {
        for (const req of p.jobLevels) {
            if (getJobLevel(req.id) < req.lv) return false;
        }
    }
    if (Array.isArray(p.anyJobLevels)) {
        for (const group of p.anyJobLevels) {
            const ids = group.ids || [];
            if (!ids.some(reqId => getJobLevel(reqId) >= group.lv)) return false;
        }
    }
    if (p.secretResearch && (G.achievements.secret_research || 0) < p.secretResearch) return false;
    if (p.totalKills && (G.achievements.totalKills || 0) < p.totalKills) return false;
    if (Array.isArray(p.achievements) && p.achievements.some(flag => !hasAchievement(flag))) return false;
    return true;
}

function canViewHiddenJob(id, j) {
    if (!j) return false;
    if (!j.hidden) return true;
    ensureGameCollections();
    return ownsJob(id) ||
           G.class_unlocks.includes(Number(id)) ||
           (G.achievements.secret_research || 0) >= 1 ||
           getPassiveScalar('detection') > 0;
}

function canAddJob(id) {
    id = Number(id);
    const j = JOB_DATA[id];
    if (!j || ownsJob(id)) return false;
    if (j.hidden && !G.class_unlocks.includes(id) && !meetsJobPrereqs(id, j)) return false;
    return meetsJobPrereqs(id, j);
}

function canStartWithJob(id, j) {
    // New rule: the starting screen only offers Base jobs.
    return !!j && (j.class_tier || 'Base') === 'Base';
}

function discoverAvailableHiddenJobs(silent) {
    ensureGameCollections();
    grantResearchFlags();
    const found = [];
    Object.entries(JOB_DATA).forEach(([id, j]) => {
        const nid = Number(id);
        if (!j.hidden || G.class_unlocks.includes(nid)) return;
        if (meetsJobPrereqs(nid, j)) {
            G.class_unlocks.push(nid);
            found.push(j.name);
        }
    });
    if (found.length && !silent) {
        found.forEach(name => print('◆ Hidden class discovered: ' + name, 'b-system'));
    }
    return found;
}

function hiddenResearchCost() {
    const base = 250 + (G.achievements.secret_research || 0) * 125;
    const detectionDiscount = Math.min(0.20, getPassiveScalar('detection') * 0.05);
    const craftDiscount = Math.min(0.25, getPassiveScalar('craftDiscount'));
    return Math.max(75, Math.floor(base * (1 - detectionDiscount - craftDiscount)));
}

function doHiddenResearch() {
    ensureGameCollections();
    const cost = hiddenResearchCost();
    clearOutput();
    showBattlePanel(false);
    print('SECRET BUILD RESEARCH', 'highlight');
    if (G.gold < cost) {
        print('You need ' + cost + ' gold to research hidden class paths. Current gold: ' + G.gold, 'danger');
        showChoices([['← Class Registry', class_registry_screen], ['← Character Status', character_screen]]);
        return;
    }
    G.gold -= cost;
    G.achievements.secret_research++;
    grantResearchFlags();
    const found = discoverAvailableHiddenJobs(false);
    updateStats();
    print('You spend ' + cost + ' gold studying hidden YGGDRASIL build notes.', 'info');
    print('Research depth: ' + G.achievements.secret_research + '  ·  Hidden flags: ' + G.achievements.flags.filter(f => f.startsWith('secret_research')).join(', '), 'success');
    if (!found.length) {
        print('No new hidden class fully unlocked yet. Build deeper prerequisites, defeat more monsters, or raise related class levels.', 'narrator');
    }
    showChoices([['Open Class Registry', class_registry_screen], ['Character Status', character_screen], ['Town Center', town_center]]);
}

function addJobPath(id) {
    id = Number(id);
    const j = JOB_DATA[id];
    if (!canAddJob(id)) return;
    G.jobs.push({ id, lv: 0 });
    applyStats(); updateStats();
    clearOutput();
    print('⊕ Class path added: ' + j.name + ' [' + j.anime + ']', 'success');
    print('It starts at Lv.0. Spend a Level Point on it to reach Lv.1 and unlock its starting skill.', 'narrator');
    showChoices([['Spend Level Points', character_screen], ['Class Registry', class_registry_screen], ['Town Center', town_center]]);
}

function appendMiniClassRegistry() {
    discoverAvailableHiddenJobs(true);
    const available = Object.entries(JOB_DATA).filter(([id]) => canAddJob(Number(id)));
    const div = document.createElement('div');
    div.className = 'cs-exp-row';
    div.innerHTML = '<div class="cs-exp-label" style="color:#e8c84a">⊕ CLASS PATHS / HIDDEN BUILDS</div>' +
        '<div style="font-size:11px;color:#8aaac8;margin-bottom:6px">Branching YGGDRASIL jobs: each anime has 5 Base jobs. Each Base has 5 Advanced paths, 4 Specialist paths, 3 Rare paths, and 1 Hidden path. Base jobs are open; deeper paths require connected parent levels.</div>';
    if (available.length) {
        available.slice(0, 8).forEach(([id, j]) => {
            const b = document.createElement('button');
            b.className = 'btn-levelup';
            b.style.cssText = 'width:100%;margin-top:4px;text-align:left';
            b.textContent = '⊕ ' + j.name + ' — ' + classTierLabel(j) + ' [' + j.anime + ']';
            b.onclick = () => addJobPath(id);
            div.appendChild(b);
        });
        if (available.length > 8) {
            const note = document.createElement('div');
            note.style.cssText = 'font-size:10px;color:#8aaac8;margin-top:5px';
            note.textContent = '+' + (available.length - 8) + ' more available in the full registry.';
            div.appendChild(note);
        }
    } else {
        div.innerHTML += '<div style="font-size:11px;color:#8aaac8">No unowned class paths remain. You already added every job path.</div>';
    }
    const full = document.createElement('button');
    full.className = 'btn-levelup';
    full.style.cssText = 'width:100%;margin-top:6px';
    full.textContent = '📜 Open Full Class Registry';
    full.onclick = class_registry_screen;
    div.appendChild(full);
    const research = document.createElement('button');
    research.className = 'btn-levelup';
    research.style.cssText = 'width:100%;margin-top:4px';
    research.textContent = '🔎 Research Hidden Classes — ' + hiddenResearchCost() + 'g';
    research.onclick = doHiddenResearch;
    div.appendChild(research);
    $ch.appendChild(div);
}

function class_registry_screen() {
    ensureGameCollections();
    discoverAvailableHiddenJobs(true);
    clearOutput();
    showBattlePanel(false);
    print('FULL CLASS REGISTRY — BRANCHING JOB PATHS', 'highlight');
    print('Build shape: 15 levels in a Base race/class → 10 in Advanced → 10 in Specialist → 5 in Rare → Hidden paths after special requirements. Starting choices are Base jobs only.', 'narrator');
    print('Gold: ' + G.gold + '  ·  Total Level: ' + G.total_lv + ' / 100  ·  Research depth: ' + (G.achievements.secret_research || 0) + '  ·  Kills: ' + (G.achievements.totalKills || 0), 'info');
    print('');
    $ch.innerHTML = '';

    const guide = document.createElement('button');
    guide.textContent = '📘 YGGDRASIL Build Guide — branching base / advanced / specialist / rare / hidden';
    guide.onclick = yggdrasil_build_guide_screen;
    $ch.appendChild(guide);

    const research = document.createElement('button');
    research.textContent = '🔎 Research Hidden Classes — ' + hiddenResearchCost() + 'g';
    research.onclick = doHiddenResearch;
    $ch.appendChild(research);

    const groups = {};
    Object.entries(JOB_DATA).forEach(([id, j]) => {
        if (!groups[j.anime]) groups[j.anime] = [];
        groups[j.anime].push([id, j]);
    });

    Object.entries(groups).forEach(([anime, list]) => {
        const hdr = document.createElement('div');
        hdr.style.cssText = 'margin:12px 0 4px;padding:6px 10px;background:linear-gradient(90deg,#12082a,#090e1c);border-left:3px solid #e8c84a;font-family:"Cinzel Decorative",serif;font-size:11px;color:#e8c84a;letter-spacing:2px';
        hdr.textContent = '— ' + anime.toUpperCase() + ' —';
        $ch.appendChild(hdr);

        list.forEach(([id, j]) => {
            const owned = ownsJob(id);
            const available = canAddJob(Number(id));
            const visible = canViewHiddenJob(Number(id), j);
            const b = document.createElement('button');
            b.style.whiteSpace = 'pre-wrap';
            b.style.lineHeight = '1.45';
            if (!visible) {
                b.textContent = '??? Hidden Class  ·  max ? levels\nPrerequisite: unknown. Research hidden paths or gain Detection passives to reveal more.';
                b.disabled = true;
            } else {
                const status = owned ? '[OWNED]' : available ? '[AVAILABLE]' : '[LOCKED]';
                const links = j.connects ? Object.entries(j.connects)
                    .filter(([k, v]) => Array.isArray(v) ? v.length : v)
                    .map(([k, v]) => k + ': ' + (Array.isArray(v) ? v.map(_jobNameById).join(', ') : _jobNameById(v)))
                    .join('\nLinks: ') : '';
                b.textContent =
                    status + ' ' + j.name + ' — ' + classTierLabel(j) + '  ·  Branch ' + (j.branch_code || '—') + '\n' +
                    'Prereq: ' + jobPrereqText(id, j) + (links ? '\nLinks: ' + links : '') + '\n' +
                    j.desc;
                b.disabled = !available;
                if (available) b.onclick = () => addJobPath(id);
            }
            $ch.appendChild(b);
        });
    });

    const back = document.createElement('button');
    back.textContent = '← Return to Character Status';
    back.onclick = character_screen;
    $ch.appendChild(back);

    const town = document.createElement('button');
    town.textContent = '← Return to Town Center';
    town.onclick = town_center;
    $ch.appendChild(town);
}

function yggdrasil_build_guide_screen() {
    clearOutput();
    showBattlePanel(false);
    print('YGGDRASIL BUILD STRUCTURE', 'highlight');
    print('A powerful build is not one class pushed to Level 100. It is a layered build made from several capped paths.', 'narrator');
    print('• 15 levels in a base race or class', 'info');
    print('• 10 levels in an advanced class', 'info');
    print('• 10 levels in another specialist class', 'info');
    print('• 5 levels in a rare class', 'info');
    print('• and so on until reaching Level 100', 'info');
    print('', 'narrator');
    print('The game uses this as the class-path rule: Base jobs cap at 15, Advanced jobs cap at 10, Specialist jobs cap at 10, Rare jobs cap at 5, and Hidden jobs cap at 5.', 'success');
    print('Each anime category has 5 Base jobs. Each Base job connects to 5 Advanced paths, 4 Specialist paths, 3 Rare paths, and 1 Hidden path.', 'info');
    print('Advanced jobs require the connected Base job. Specialist and Rare jobs require connected Advanced jobs. Hidden jobs require deep class milestones, research, and monster kills.', 'narrator');
    showChoices([
        ['📜 Open Class Registry', class_registry_screen],
        ['⚔ Character Status', character_screen],
        ['← Town Center', town_center],
    ]);
}

// Recompute all 9 stats from current racial + job level investments
function applyStats() {
    ensureGameCollections();
    const race = RACE_DATA[G.race_id];
    let hp=0, mp=0, pa=0, pd=0, ag=0, ma=0, md=0, rs=0, sp=0;
    if (race) {
        const b=race.base, p=race.per_lv, lv=G.race_lv;
        hp+=b.hp+p.hp*lv; mp+=b.mp+p.mp*lv; pa+=b.pa+p.pa*lv;
        pd+=b.pd+p.pd*lv; ag+=b.ag+p.ag*lv; ma+=b.ma+p.ma*lv;
        md+=b.md+p.md*lv; rs+=b.rs+p.rs*lv; sp+=b.sp+p.sp*lv;
    }
    G.jobs.forEach(job => {
        const jd=JOB_DATA[job.id];
        if (!jd || job.lv<=0) return;
        const b=jd.base, p=jd.per_lv, lv=job.lv;
        hp+=b.hp+p.hp*lv; mp+=b.mp+p.mp*lv; pa+=b.pa+p.pa*lv;
        pd+=b.pd+p.pd*lv; ag+=b.ag+p.ag*lv; ma+=b.ma+p.ma*lv;
        md+=b.md+p.md*lv; rs+=b.rs+p.rs*lv; sp+=b.sp+p.sp*lv;
    });
    hp+=G.bonus.hp; mp+=G.bonus.mp; pa+=G.bonus.pa;
    pd+=G.bonus.pd; ag+=G.bonus.ag; ma+=G.bonus.ma;
    md+=G.bonus.md; rs+=G.bonus.rs; sp+=G.bonus.sp;
    // passive skill bonuses
    G.learned_skills.forEach(sk => {
        if (sk.type !== 'p' || !sk.bon) return;
        const b = sk.bon;
        if (b.hp) hp+=b.hp; if (b.mp) mp+=b.mp; if (b.pa) pa+=b.pa;
        if (b.pd) pd+=b.pd; if (b.ag) ag+=b.ag; if (b.ma) ma+=b.ma;
        if (b.md) md+=b.md; if (b.rs) rs+=b.rs; if (b.sp) sp+=b.sp;
    });
    // Active recruits grant small passive support bonuses.
    getActiveRecruits().forEach(r => {
        const b = r.bonus || {};
        if (b.hp) hp+=b.hp; if (b.mp) mp+=b.mp; if (b.pa) pa+=b.pa;
        if (b.pd) pd+=b.pd; if (b.ag) ag+=b.ag; if (b.ma) ma+=b.ma;
        if (b.md) md+=b.md; if (b.rs) rs+=b.rs; if (b.sp) sp+=b.sp;
    });
    G.max_hp=Math.floor(hp); G.max_mp=Math.floor(mp);
    G.phy_atk=Math.floor(pa); G.phy_def=Math.floor(pd);
    G.agi=Math.floor(ag);
    G.mag_atk=Math.floor(ma); G.mag_def=Math.floor(md);
    G.resist=Math.floor(rs); G.special=Math.floor(sp);
    G.atk=G.phy_atk; G.int_stat=G.mag_atk;
    G.hp=Math.min(G.hp, G.max_hp);
    G.mp=Math.min(G.mp, G.max_mp);
    G.total_lv = G.race_lv + G.jobs.reduce((s,j)=>s+j.lv, 0);
    G.level = G.total_lv;
}

function _jobId(catIndex, baseIndex, tierCode, pathIndex) {
    // IDs are spaced so every branch remains readable and stable.
    // tierCode: 0 base, 1 advanced, 2 specialist, 3 rare, 9 hidden
    return 100000 + catIndex * 10000 + baseIndex * 1000 + tierCode * 100 + pathIndex;
}

function _branchCode(catIndex, baseIndex) {
    return 'C' + (catIndex + 1) + '-B' + (baseIndex + 1);
}

    const tierScale = { Base:1.00, Advanced:1.25, Specialist:1.38, Rare:1.65, Hidden:1.85 }[tier] || 1;
    const profile = {
        melee:   { hp:35, mp:10, pa:8, pd:5, ag:5, ma:1, md:3, rs:3, sp:3 },
        ranged:  { hp:25, mp:20, pa:6, pd:3, ag:7, ma:3, md:3, rs:3, sp:5 },
        magic:   { hp:18, mp:38, pa:1, pd:2, ag:3, ma:9, md:6, rs:4, sp:7 },
        defense: { hp:45, mp:14, pa:4, pd:9, ag:1, ma:2, md:7, rs:8, sp:3 },
        speed:   { hp:26, mp:18, pa:6, pd:3, ag:9, ma:3, md:3, rs:3, sp:5 },
        support: { hp:28, mp:32, pa:2, pd:4, ag:4, ma:5, md:8, rs:7, sp:6 },
        summon:  { hp:30, mp:34, pa:3, pd:4, ag:3, ma:6, md:5, rs:5, sp:9 },
        craft:   { hp:32, mp:24, pa:4, pd:6, ag:3, ma:5, md:5, rs:6, sp:8 },
    }[role] || { hp:30, mp:25, pa:5, pd:5, ag:5, ma:5, md:5, rs:5, sp:5 };
    const perBase = {
        Base:       { hp:2, mp:1, pa:1, pd:1, ag:1, ma:1, md:1, rs:1, sp:1 },
        Advanced:   { hp:3, mp:2, pa:1, pd:1, ag:1, ma:1, md:1, rs:1, sp:1 },
        Specialist: { hp:3, mp:2, pa:2, pd:1, ag:1, ma:2, md:1, rs:1, sp:1 },
        Rare:       { hp:5, mp:3, pa:2, pd:2, ag:2, ma:2, md:2, rs:2, sp:2 },
        Hidden:     { hp:6, mp:4, pa:3, pd:2, ag:2, ma:3, md:2, rs:2, sp:3 },
    }[tier] || { hp:2, mp:1, pa:1, pd:1, ag:1, ma:1, md:1, rs:1, sp:1 };
    const base = {};
    Object.keys(profile).forEach(k => base[k] = Math.max(0, Math.round(profile[k] * tierScale)));
    return { base, per_lv: perBase };
}

function _skillName(jobName, tier, lv, seed) {
    const roots = ['Opening', 'Crest', 'Surge', 'Vector', 'Mandala', 'Breaker', 'Pulse', 'Aegis', 'Mirage', 'Judgment'];
    const forms = ['Art', 'Form', 'Protocol', 'Kata', 'Command', 'Seal', 'Drive', 'Circuit', 'Edge', 'Burst'];
    return jobName + ': ' + roots[seed % roots.length] + ' ' + forms[(seed + lv) % forms.length] + ' Lv.' + lv;
}

function _rolePow(role, tier, lv) {
    const tierBonus = { Base:0, Advanced:18, Specialist:28, Rare:45, Hidden:60 }[tier] || 0;
    const roleBonus = { melee:12, ranged:10, magic:14, speed:10, defense:5, support:0, summon:8, craft:6 }[role] || 8;
    return Math.max(0, 22 + tierBonus + roleBonus + lv * 6);
}

function _activeSkill(id, jobName, role, tier, lv, seed, extraText) {
    const statuses = ['burn','poison','bleed','stun','paralysis','weaken','fear','vulnerable','marked','confusion','freeze'];
    const buffs = ['bravery','haste','guard','regen','focus','thorns'];
    const mode = seed % 10;
    const sk = {
        id: id + '_lv' + lv,
        name: _skillName(jobName, tier, lv, seed),
        type: 'a',
        mp: Math.max(0, Math.round((6 + lv * 2 + (tier === 'Hidden' ? 10 : 0)) * (role === 'magic' || role === 'summon' ? 1.25 : 1))),
        pow: _rolePow(role, tier, lv),
        desc: jobName + ' technique. ' + extraText
    };
    if (role === 'support' && mode % 3 === 0) { sk.pow = 0; sk.heal = 0.18 + Math.min(0.22, lv * 0.015); sk.buf = buffs[seed % buffs.length]; sk.cleanse = seed % 2 === 0; sk.desc += ' Heals, buffs, and stabilizes the party rhythm.'; return sk; }
    if (mode === 0) { sk.st = statuses[seed % statuses.length]; sk.sc = 0.34; sk.drain = true; sk.desc += ' Drains HP while applying pressure.'; }
    if (mode === 1) { sk.aoe = true; sk.st = statuses[(seed + 2) % statuses.length]; sk.sc = 0.22; sk.desc += ' Hits all enemies in the encounter.'; }
    if (mode === 2) { sk.buf = buffs[seed % buffs.length]; sk.hits = 2; sk.desc += ' Builds momentum with a two-hit self-buff combo.'; }
    if (mode === 3) { sk.hits = 3; sk.st = statuses[(seed + 4) % statuses.length]; sk.sc = 0.25; sk.desc += ' A three-hit combo with a status chance.'; }
    if (mode === 4) { sk.hpCostPct = 0.06; sk.execute = 0.32; sk.desc += ' Blood Price attack that executes weakened enemies.'; }
    if (mode === 5) { sk.mpRestorePct = 0.10; sk.st = statuses[(seed + 6) % statuses.length]; sk.sc = 0.30; sk.desc += ' Restores MP while disrupting the enemy.'; }
    if (mode === 6) { sk.buf = 'guard'; sk.st = 'marked'; sk.sc = 0.35; sk.desc += ' Guards the user and marks the target.'; }
    if (mode === 7) { sk.aoe = true; sk.hits = 2; sk.desc += ' A double-wave area attack.'; }
    if (mode === 8) { sk.buf = 'focus'; sk.st = 'vulnerable'; sk.sc = 0.40; sk.desc += ' Focuses the user and exposes a vulnerable point.'; }
    if (mode === 9) { sk.cleanse = true; sk.mpRestore = 8 + lv * 2; sk.st = statuses[(seed + 1) % statuses.length]; sk.sc = 0.28; sk.desc += ' Cleanses negative effects and restores MP.'; }
    return sk;
}

function _passiveSkill(id, jobName, role, tier, lv, seed) {
    const bon = {
        hp: (role === 'defense' || role === 'melee') ? 12 + lv * 4 : 4 + lv * 2,
        mp: (role === 'magic' || role === 'support' || role === 'summon') ? 10 + lv * 3 : 2 + lv,
        pa: (role === 'melee' || role === 'speed' || role === 'ranged') ? 3 + Math.floor(lv / 2) : 1,
        pd: (role === 'defense') ? 4 + Math.floor(lv / 2) : 1,
        ag: (role === 'speed' || role === 'ranged') ? 3 + Math.floor(lv / 2) : 1,
        ma: (role === 'magic' || role === 'summon') ? 3 + Math.floor(lv / 2) : 1,
        md: (role === 'support' || role === 'defense') ? 3 + Math.floor(lv / 2) : 1,
        rs: (role === 'support' || role === 'defense') ? 3 + Math.floor(lv / 2) : 1,
        sp: (role === 'summon' || role === 'craft') ? 3 + Math.floor(lv / 2) : 1,
    };
    const sk = {
        id: id + '_passive_lv' + lv,
        name: jobName + ': Class Mastery Lv.' + lv,
        type: 'p',
        bon,
        desc: 'Passive growth from ' + jobName + '. Improves class-specific scaling and YGGDRASIL build synergy.'
    };
    if (role === 'magic') sk.spellBoost = 0.04;
    if (role === 'summon') sk.summonBoost = 0.04;
    if (role === 'craft') sk.craftDiscount = 0.03;
    if (role === 'support') sk.detection = 0.03;
    if (tier === 'Hidden') sk.immune = ['fear','confusion'];
    return sk;
}

function _makeSkills(numId, jobName, role, tier, seed) {
    const id = 'j' + numId;
    const text = 'Class tier: ' + tier + '. Branch seed ' + seed + '.';
    if (tier === 'Base') return [
        [1,  [_activeSkill(id, jobName, role, tier, 1,  seed, text + ' Unique starting skill.')]],
        [5,  [_activeSkill(id, jobName, role, tier, 5,  seed + 1, text)]],
        [10, [_passiveSkill(id, jobName, role, tier, 10, seed + 2)]],
        [15, [_activeSkill(id, jobName, role, tier, 15, seed + 3, text + ' Base capstone.')]],
    ];
    if (tier === 'Advanced' || tier === 'Specialist') return [
        [1,  [_activeSkill(id, jobName, role, tier, 1,  seed, text + ' Unique starting skill.')]],
        [5,  [_passiveSkill(id, jobName, role, tier, 5,  seed + 1)]],
        [10, [_activeSkill(id, jobName, role, tier, 10, seed + 2, text + ' Path capstone.')]],
    ];
    return [
        [1, [_activeSkill(id, jobName, role, tier, 1, seed, text + ' Unique starting skill.')]],
        [3, [_passiveSkill(id, jobName, role, tier, 3, seed + 1)]],
        [5, [_activeSkill(id, jobName, role, tier, 5, seed + 2, text + ' Short rare-path capstone.')]],
    ];
}

function _jobDesc(baseDesc, tier, branchText, prereqText) {
    return baseDesc + '  YGGDRASIL tier: ' + tier + '. ' + branchText + ' ' + prereqText;
}

function buildJobData() {
    const data = {};
    JOB_PATHS.forEach((cat, ci) => {
        cat.bases.forEach((base, bi) => {
            const branch = _branchCode(ci, bi);
            const baseId = _jobId(ci, bi, 0, 0);
            const advIds = JOB_ADVANCED_PATHS.map((_, ai) => _jobId(ci, bi, 1, ai + 1));
            const specIds = JOB_SPECIALIST_PATHS.map((_, si) => _jobId(ci, bi, 2, si + 1));
            const rareIds = JOB_RARE_PATHS.map((_, ri) => _jobId(ci, bi, 3, ri + 1));
            const hiddenId = _jobId(ci, bi, 9, 0);
            const seedBase = (ci + 1) * 31 + (bi + 1) * 7;

            function addJob(id, name, tier, role, desc, prereq, connects, hidden) {
                const stat = _statProfile(role, tier);
                data[id] = {
                    name, anime: cat.anime, class_tier: tier, max_lv: JOB_TIER_CAPS[tier],
                    desc, base: stat.base, per_lv: stat.per_lv,
                    skills: _makeSkills(id, name, role, tier, seedBase + id % 97),
                    prereq: prereq || {}, connects: connects || {}, hidden: !!hidden,
                    path_base_id: baseId, branch_code: branch,
                    path_base_name: base.name
                };
            }

            addJob(baseId, base.name, 'Base', base.role,
                _jobDesc(base.desc, 'Base', 'Starting base path ' + branch + '. Unlocks five connected Advanced paths.', 'No prerequisite.'),
                {},
                { advanced: advIds, specialist: specIds, rare: rareIds, hidden: hiddenId },
                false
            );

            const advToSpec = [
                [specIds[0], specIds[1]],
                [specIds[1], specIds[2]],
                [specIds[2], specIds[3]],
                [specIds[3], specIds[0]],
                [specIds[0], specIds[2]],
            ];
            const advToRare = [
                [rareIds[0], rareIds[1]],
                [rareIds[1], rareIds[2]],
                [rareIds[2], rareIds[0]],
                [rareIds[0], rareIds[1]],
                [rareIds[1], rareIds[2]],
            ];

            advIds.forEach((advId, ai) => {
                const advName = base.name + ' — ' + JOB_ADVANCED_PATHS[ai];
                addJob(advId, advName, 'Advanced', base.role,
                    _jobDesc(base.desc, 'Advanced', 'Connected to base path ' + base.name + '. Unlocks 2 Specialist and 2 Rare paths.', 'Requires ' + base.name + ' Lv.5.'),
                    { jobLevels: [{ id: baseId, lv: 5 }] },
                    { base: baseId, specialist: advToSpec[ai], rare: advToRare[ai] },
                    false
                );
            });

            specIds.forEach((specId, si) => {
                const parentAdv = advIds.filter((advId, ai) => advToSpec[ai].includes(specId));
                const specName = base.name + ' — ' + JOB_SPECIALIST_PATHS[si];
                addJob(specId, specName, 'Specialist', base.role,
                    _jobDesc(base.desc, 'Specialist', 'Specialist branch of ' + base.name + '. Advanced parent links: ' + parentAdv.length + '.', 'Requires one connected Advanced path Lv.5.'),
                    { anyJobLevels: [{ ids: parentAdv, lv: 5 }] },
                    { base: baseId, advanced: parentAdv },
                    false
                );
            });

            rareIds.forEach((rareId, ri) => {
                const parentAdv = advIds.filter((advId, ai) => advToRare[ai].includes(rareId));
                const rareName = base.name + ' — ' + JOB_RARE_PATHS[ri];
                addJob(rareId, rareName, 'Rare', base.role,
                    _jobDesc(base.desc, 'Rare', 'Rare branch of ' + base.name + '. Advanced parent links: ' + parentAdv.length + '.', 'Requires one connected Advanced path Lv.10.'),
                    { anyJobLevels: [{ ids: parentAdv, lv: 10 }] },
                    { base: baseId, advanced: parentAdv },
                    false
                );
            });

            addJob(hiddenId, base.name + ' — ' + JOB_HIDDEN_PATH, 'Hidden', base.role,
                _jobDesc(base.desc, 'Hidden', 'Secret capstone path of ' + base.name + '.', 'Requires ' + base.name + ' Lv.15, one connected Specialist Lv.10, one connected Rare Lv.5, Hidden Research III, and 10 monster kills.'),
                {
                    jobLevels: [{ id: baseId, lv: 15 }],
                    anyJobLevels: [{ ids: specIds, lv: 10 }, { ids: rareIds, lv: 5 }],
                    achievements: ['secret_research_3','monster_slayer_10'],
                    totalKills: 10,
                    secretResearch: 3
                },
                { base: baseId, specialist: specIds, rare: rareIds },
                true
            );
        });
    });
    return data;
}

function updateStats() {
    document.getElementById('s-name').textContent  = G.name  || '—';
    const activeJob = G.jobs.length ? JOB_DATA[G.jobs[0].id] : null;
    document.getElementById('s-class').textContent = activeJob ? activeJob.name : '—';
    const pts = (G.level_pts > 0 ? ' [Lv+' + G.level_pts + ']' : '') + (G.stat_pts > 0 ? ' [Sp+' + G.stat_pts + ']' : '');
    document.getElementById('s-level').textContent = G.total_lv + pts;
    document.getElementById('s-hp').textContent    = G.hp + '/' + G.max_hp;
    document.getElementById('s-mp').textContent    = G.mp + '/' + G.max_mp;
    document.getElementById('s-gold').textContent  = G.gold;
}

function updateBattlePanel() {
    if (!B) return;
    // Rebuild enemy area
    const area = document.getElementById('b-enemy-area');
    area.innerHTML = '';
    B.enemies.forEach((en, i) => {
        const hp  = B.enemy_hps[i];
        const pct = Math.max(0, (hp / en.hp) * 100);
        const dead = hp <= 0;
        const isCurrent = (i === B.enemy_idx);
        const row = document.createElement('div');
        row.className = 'bp-row enemy-row';
        row.style.opacity = dead ? '0.35' : '1';
        row.innerHTML =
            '<div class="bp-emoji"' + (i === 0 ? ' id="b-e-emoji"' : '') + '>' + en.emoji + '</div>' +
            '<div class="bp-info">' +
              '<div class="bp-name enemy-col"' + (i === 0 ? ' id="b-e-name"' : '') + '>' +
                (B.enemies.length > 1 ? (isCurrent ? '▶ ' : '  ') : '') + en.name + (dead ? '  [DEFEATED]' : '') +
              '</div>' +
              '<div class="bar-label">HP</div>' +
              '<div class="bar-track"><div class="bar-fill bar-hp-e"' + (i === 0 ? ' id="b-e-bar"' : '') +
                ' style="width:' + pct + '%"></div></div>' +
              '<div class="bar-text"' + (i === 0 ? ' id="b-e-hp"' : '') + '>' + hp + ' / ' + en.hp + '</div>' +
              '<div class="sfx-row"' + (i === 0 ? ' id="b-e-sfx"' : '') + '></div>' +
            '</div>';
        area.appendChild(row);
        if (i === 0) renderBadges(B.e_fxs[0], 'b-e-sfx');
    });

    const pHPct = Math.max(0, (G.hp / G.max_hp) * 100);
    const pMPct = Math.max(0, (G.mp / G.max_mp) * 100);
    document.getElementById('b-p-name').textContent     = G.name + '  (Lv.' + G.level + ')';
    document.getElementById('b-p-hp-bar').style.width   = pHPct + '%';
    document.getElementById('b-p-hp').textContent       = G.hp + ' / ' + G.max_hp;
    document.getElementById('b-p-mp-bar').style.width   = pMPct + '%';
    document.getElementById('b-p-mp').textContent       = G.mp + ' / ' + G.max_mp;
    const hpBar = document.getElementById('b-p-hp-bar');
    hpBar.style.background = pHPct > 50 ? '#27ae60' : pHPct > 25 ? '#e67e22' : '#c0392b';
    renderBadges(B.p_fx, 'b-p-sfx');
    renderRecruitBattlePanel();
}

function renderRecruitBattlePanel() {
    const area = document.getElementById('b-recruit-area');
    if (!area) return;
    area.innerHTML = '';
    if (!B) return;
    ensureRecruitBattleState();
    const active = getActiveRecruits();
    if (!active.length) return;
    active.forEach(r => {
        const max = B.recruit_max_hps[r.id] || recruitMaxHp(r);
        const hp = Math.max(0, Math.min(max, B.recruit_hps[r.id] ?? max));
        const pct = Math.max(0, Math.min(100, (hp / max) * 100));
        const used = B.recruit_used && B.recruit_used[r.id];
        const ko = hp <= 0;
        const row = document.createElement('div');
        row.className = 'bp-row recruit-row' + (ko ? ' recruit-ko' : '');
        row.innerHTML =
            '<div class="bp-emoji">' + r.emoji + '</div>' +
            '<div class="bp-info">' +
              '<div class="bp-name recruit-col">' + r.name + '  <span style="font-size:10px;color:#5a7a98">[' + r.anime + ' · ' + r.role + ']' + (used ? ' · ASSIST USED' : '') + (ko ? ' · KO' : '') + '</span></div>' +
              '<div class="bar-label">RECRUIT HP</div>' +
              '<div class="bar-track"><div class="bar-fill bar-hp-r" style="width:' + pct + '%"></div></div>' +
              '<div class="bar-text">' + hp + ' / ' + max + '</div>' +
            '</div>';
        area.appendChild(row);
    });
}

// ── Level Control ─────────────────────────────────────────────
function refreshLvlCtrl() {
    const area = document.getElementById('lvl-ctrl-area');
    if (!area) return;
    area.innerHTML = '';
    const race = RACE_DATA[G.race_id];
    if (race) {
        area.appendChild(makeLvlRow(
            'Race Lv  (max ' + (race.max_lv || 25) + ')',
            G.race_lv,
            () => { if (G.race_lv < (race.max_lv||25)) { G.race_lv++; G.total_lv++; G.level++; applyStats(); updateStats(); refreshLvlCtrl(); } },
            () => { if (G.race_lv > 0) { G.race_lv--; G.total_lv--; G.level--; applyStats(); updateStats(); refreshLvlCtrl(); } }
        ));
    }
    G.jobs.forEach(job => {
        const jd = JOB_DATA[job.id];
        if (!jd) return;
        area.appendChild(makeLvlRow(
            jd.name + ' Lv  (max ' + (jd.max_lv||50) + ')',
            job.lv,
            () => { if (job.lv < (jd.max_lv||50)) { job.lv++; G.total_lv++; G.level++; applyStats(); updateStats(); refreshLvlCtrl(); } },
            () => { if (job.lv > 0) { job.lv--; G.total_lv--; G.level--; applyStats(); updateStats(); refreshLvlCtrl(); } }
        ));
    });
    if (!race && G.jobs.length === 0)
        area.innerHTML = '<p style="color:#5a7a98;font-size:11px">Start a game first.</p>';
}

function makeLvlRow(label, cur, onPlus, onMinus) {
    const d = document.createElement('div');
    d.className = 'lvl-ctrl';
    const lbl = document.createElement('label'); lbl.textContent = label;
    const m = document.createElement('button'); m.textContent = '−'; m.onclick = onMinus;
    const v = document.createElement('span');   v.className = 'lv-num'; v.textContent = cur;
    const p = document.createElement('button'); p.textContent = '+'; p.onclick = onPlus;
    d.append(lbl, m, v, p);
    return d;
}

function devGold(n)    { G.gold = Math.max(0, G.gold + n); updateStats(); }
function devFillHP()   { G.hp = G.max_hp; G.mp = G.max_mp; updateStats(); }
function devGiveExp(n) {
    G.exp += n;
    while (G.exp >= G.next_exp) {
        if (G.total_lv + G.level_pts >= 100) { G.exp = Math.min(G.exp, Math.max(0, G.next_exp - 1)); break; }
        G.exp -= G.next_exp; G.level_pts++; G.stat_pts += 10;
        G.next_exp = 30 + 10 * G.total_lv;
    }
    updateStats();
}

// ── Save / Load ───────────────────────────────────────────────
function saveGame() {
    try {
        localStorage.setItem('animeRPG_v1', JSON.stringify(G));
        showSaveMsg('✓ Saved at ' + new Date().toLocaleTimeString(), '#2ecc71');
    } catch(e) { showSaveMsg('Save failed: ' + e.message, '#ff4757'); }
}
function loadGame() {
    const raw = localStorage.getItem('animeRPG_v1');
    if (!raw) { showSaveMsg('No save file found.', '#ff4757'); return; }
    try {
        const saved = JSON.parse(raw);
        Object.keys(saved).forEach(k => { G[k] = saved[k]; });
        ensureGameCollections();
        applyStats(); updateStats();
        showSaveMsg('✓ Loaded successfully!', '#2ecc71');
    } catch(e) { showSaveMsg('Load failed: ' + e.message, '#ff4757'); }
}
function confirmNewGame() {
    if (!confirm('Start a new game? All unsaved progress will be lost.')) return;
    localStorage.removeItem('animeRPG_v1');
    location.reload();
}
function showSaveMsg(txt, color) {
    const el = document.getElementById('save-msg');
    if (!el) return;
    el.textContent = txt; el.style.color = color;
    setTimeout(() => { if (el) el.textContent = ''; }, 3500);
}

const MusicSystem = {
    ctx: null, masterGain: null,
    playing: false, trackId: null,
    volume: 0.05, noteIdx: 0, nextNoteTime: 0, timerId: null,

    _init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = this.volume;
        this.masterGain.connect(this.ctx.destination);
    },

    play(id) {
        this._init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        this.stop();
        this.trackId = id; this.noteIdx = 0; this.playing = true;
        this.nextNoteTime = this.ctx.currentTime + 0.05;
        this._tick();
        document.querySelectorAll('[data-track]').forEach(b =>
            b.classList.toggle('active', b.dataset.track === id));
        const np = document.getElementById('now-playing');
        if (np) np.textContent = '♪  ' + (MUSIC_TRACKS[id]?.name || id);
    },

    stop() {
        this.playing = false;
        if (this.timerId) { clearTimeout(this.timerId); this.timerId = null; }
        document.querySelectorAll('[data-track]').forEach(b => b.classList.remove('active'));
        const np = document.getElementById('now-playing');
        if (np) np.textContent = 'No music';
    },

    setVolume(pct) {
        this.volume = pct / 100 * 0.25;   // map 0-100 → 0-0.25 master gain
        if (this.masterGain)
            this.masterGain.gain.setTargetAtTime(this.volume, this.ctx.currentTime, 0.02);
    },

    _tick() {
        if (!this.playing) return;
        const track = MUSIC_TRACKS[this.trackId];
        if (!track) return;
        const lookahead = 0.35;
        while (this.nextNoteTime < this.ctx.currentTime + lookahead) {
            const [freq, beats] = track.notes[this.noteIdx];
            const dur = beats * (60 / track.bpm);
            if (freq > 0) this._note(freq, dur, track.wave || 'sine');
            this.nextNoteTime += dur;
            this.noteIdx = (this.noteIdx + 1) % track.notes.length;
        }
        this.timerId = setTimeout(() => this._tick(), 100);
    },

    _note(freq, dur, wave) {
        const osc  = this.ctx.createOscillator();
        const env  = this.ctx.createGain();
        osc.connect(env); env.connect(this.masterGain);
        osc.type = wave; osc.frequency.value = freq;
        const t = this.nextNoteTime;
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(0.6, t + 0.015);
        env.gain.setValueAtTime(0.6, t + dur * 0.68);
        env.gain.linearRampToValueAtTime(0, t + dur * 0.94);
        osc.start(t); osc.stop(t + dur);
    },
};

    marked:    { icon: '印', label: 'Marked',    vulnMult: 1.25, turns: 3, neg: true  },
    // Fatal
    doom:      { icon: '💀', label: 'Doom',      fatal: true,   turns: 3, neg: true  },
};

// ── Status helpers ────────────────────────────────────────────
// Render status badges into a sfx-row element
function renderBadges(fx, elId) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.innerHTML = Object.entries(fx)
        .filter(([, t]) => t > 0)
        .map(([id, t]) => {
            const s = STATUS[id];
            return '<span class="sfx sfx-' + id + '">' + s.icon + ' ' + s.label + ' ' + t + '</span>';
        }).join('');
}

// Apply a status to player ('p') or enemy ('e')
function applyFx(target, id) {
    if (!STATUS[id]) return;
    const fx   = target === 'p' ? B.p_fx : B.e_fx;
    const name = target === 'p' ? G.name : B.enemy.name;
    const st   = STATUS[id];
    if (hasStatusImmunity(target, id)) {
        print('✦ ' + name + ' is immune to ' + st.label + ' through class growth!', target === 'p' ? 'success' : 'b-system');
        updateBattlePanel();
        return;
    }
    // Don't overwrite if more turns remain
    fx[id] = Math.max(fx[id] || 0, st.turns);
    print(st.icon + ' ' + name + ' is afflicted with ' + st.label + '! (' + st.turns + ' turns)',
          target === 'p' ? 'danger' : 'b-system');
    updateBattlePanel();
}

// Apply a buff status to player ('p') or enemy ('e')
function applyBuff(target, id) {
    if (!STATUS[id]) return;
    const fx   = target === 'p' ? B.p_fx : B.e_fx;
    const name = target === 'p' ? G.name : B.enemy.name;
    const st   = STATUS[id];
    fx[id] = st.turns;
    print(st.icon + ' ' + name + ' gains ' + st.label + '! (' + st.turns + ' turns)', 'success');
    updateBattlePanel();
}

// Wake a sleeping/frozen target when hit — returns true if woken
function wakeOnHit(target) {
    const fx   = target === 'p' ? B.p_fx : B.e_fx;
    const name = target === 'p' ? G.name : B.enemy.name;
    let woke = false;
    if (fx.sleep)  { delete fx.sleep;  print(name + ' woke up!',          'info'); woke = true; }
    if (fx.freeze) { delete fx.freeze; print(name + ' thawed out!',       'info'); woke = true; }
    if (woke) updateBattlePanel();
    return woke;
}

// Vulnerability multiplier (freeze / petrify)
function vulnMult(target) {
    const fx = target === 'p' ? B.p_fx : B.e_fx;
    let m = 1;
    if (fx.petrify)   m *= STATUS.petrify.vulnMult;
    if (fx.freeze)    m *= STATUS.freeze.vulnMult;
    if (fx.vulnerable)m *= STATUS.vulnerable.vulnMult;
    if (fx.marked)    m *= STATUS.marked.vulnMult;
    return m;
}

// ATK multiplier for the acting party (bravery/haste buff, weaken debuff)
function atkMult(target) {
    const fx = target === 'p' ? B.p_fx : B.e_fx;
    let m = 1;
    if (fx.bravery) m *= STATUS.bravery.atkMult;
    if (fx.haste)   m *= STATUS.haste.atkMult;
    if (fx.focus)   m *= STATUS.focus.atkMult;
    if (fx.weaken)  m *= STATUS.weaken.atkMult;
    return m;
}

// Process one turn-start for target: tick DoT/doom, then check skip.
// Returns 'dead' | 'skip' | 'act'
function processTurnStart(target) {
    const fx    = target === 'p' ? B.p_fx : B.e_fx;
    const name  = target === 'p' ? G.name  : B.enemy.name;
    const maxHp = target === 'p' ? G.max_hp : B.enemy.hp;
    let died = false;

    // ── DoT (burn / poison / bleed) ──────────────────────────────
    for (const id of ['burn', 'poison', 'bleed']) {
        if (!fx[id]) continue;
        const dmg = Math.max(1, Math.floor(maxHp * STATUS[id].dotPct));
        if (target === 'p') { G.hp        = Math.max(0, G.hp        - dmg); if (G.hp        === 0) died = true; }
        else                { B.enemy_hp  = Math.max(0, B.enemy_hp  - dmg); if (B.enemy_hp  === 0) died = true; }
        print(STATUS[id].icon + ' ' + name + ' takes ' + dmg + ' ' + STATUS[id].label + ' damage!',
              target === 'p' ? 'danger' : 'success');
        if (--fx[id] <= 0) delete fx[id];
    }

    // ── Regeneration ───────────────────────────────────────────────
    if (fx.regen) {
        const heal = Math.max(1, Math.floor(maxHp * STATUS.regen.regenPct));
        if (target === 'p') G.hp = Math.min(G.max_hp, G.hp + heal);
        else B.enemy_hp = Math.min(B.enemy.hp, B.enemy_hp + heal);
        print(STATUS.regen.icon + ' ' + name + ' regenerates ' + heal + ' HP!', target === 'p' ? 'success' : 'danger');
    }

    // ── Doom countdown ────────────────────────────────────────────
    if (fx.doom) {
        if (fx.doom === 1) {
            print('💀 DOOM! ' + name + ' is obliterated!', 'danger');
            if (target === 'p') G.hp = 0; else B.enemy_hp = 0;
            died = true;
        } else {
            print('💀 Doom: ' + (fx.doom - 1) + ' turn(s) remaining...', 'danger');
        }
        if (--fx.doom <= 0) delete fx.doom;
    }

    updateStats();
    updateBattlePanel();
    if (died) return 'dead';

    // ── Skip statuses (hard skip) ─────────────────────────────────
    for (const id of ['stun', 'sleep', 'freeze', 'fear', 'petrify']) {
        if (!fx[id]) continue;
        print(STATUS[id].icon + ' ' + name + ' is ' + STATUS[id].label + 'ed — cannot act!', 'danger');
        if (--fx[id] <= 0) delete fx[id];
        updateBattlePanel();
        return 'skip';
    }

    // ── Paralysis (50% skip chance) ───────────────────────────────
    if (fx.paralysis) {
        if (--fx.paralysis <= 0) delete fx.paralysis;
        if (Math.random() < 0.5) {
            print('⚡ ' + name + ' is paralyzed — cannot move!', 'danger');
            updateBattlePanel();
            return 'skip';
        }
    }

    // ── Confusion (50% chance — self-attack) ─────────────────────
    if (fx.confusion) {
        if (--fx.confusion <= 0) delete fx.confusion;
        if (Math.random() < 0.5) {
            const selfDmg = Math.floor((target === 'p' ? G.atk : B.enemy.atk) * 0.6);
            if (target === 'p') { G.hp        = Math.max(0, G.hp        - selfDmg); if (G.hp        === 0) died = true; }
            else                { B.enemy_hp  = Math.max(0, B.enemy_hp  - selfDmg); if (B.enemy_hp  === 0) died = true; }
            print('🌀 ' + name + ' is confused and attacks itself for ' + selfDmg + '!', 'danger');
            updateStats();
            updateBattlePanel();
            return died ? 'dead' : 'skip';
        }
    }

    // ── Stat mods tick when their holder acts ────────────────────
    for (const id of ['bravery', 'haste', 'weaken', 'guard', 'regen', 'focus', 'thorns', 'vulnerable', 'marked']) {
        if (!fx[id]) continue;
        if (--fx[id] <= 0) { delete fx[id]; print(STATUS[id].icon + ' ' + STATUS[id].label + ' wore off.', 'narrator'); }
    }
    updateBattlePanel();
    return 'act';
}
